<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>까꿍 디미방 메뉴 생성기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Dodum&display=swap');

  :root {
    --bg: #FDF8F3;
    --card: #FFFFFF;
    --primary: #E8845A;
    --primary-light: #FFF0E8;
    --secondary: #6BAE8E;
    --secondary-light: #EBF7F2;
    --text: #2D2D2D;
    --text-light: #888;
    --border: #EDE8E0;
    --shadow: 0 4px 20px rgba(0,0,0,0.06);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  .logo {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 20px;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { font-size: 24px; }

  .btn {
    padding: 10px 20px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }

  .btn-primary:hover { background: #d4714a; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--secondary);
    color: white;
  }

  .btn-secondary:hover { background: #5a9a7c; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--text-light);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { background: var(--bg); }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .week-selector {
    background: white;
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .week-selector label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-light);
  }

  .week-selector input[type="date"] {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 50px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  .week-selector input[type="date"]:focus {
    border-color: var(--primary);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }

  .day-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.2s;
  }

  .day-card:hover { transform: translateY(-2px); }

  .day-header {
    padding: 14px 18px;
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-header.yusik {
    background: linear-gradient(135deg, #6BAE8E, #4a9478);
    color: white;
  }

  .day-header.yusik-label {
    font-size: 11px;
    background: rgba(255,255,255,0.25);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .day-header.yushik-day {
    background: linear-gradient(135deg, #E8845A, #d4714a);
    color: white;
  }

  .menu-item {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    position: relative;
  }

  .menu-item:last-child { border-bottom: none; }

  .menu-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .menu-num.hanwoo { background: #FFF0E8; color: var(--primary); }
  .menu-num.chicken { background: #EBF7F2; color: var(--secondary); }
  .menu-num.other { background: #F0EEFF; color: #8B6FE8; }

  .menu-content { flex: 1; }

  .menu-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .menu-ingredients {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.5;
  }

  .menu-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .menu-item:hover .menu-actions { opacity: 1; }

  .action-btn {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .action-btn.edit { background: #EBF7F2; color: var(--secondary); }
  .action-btn.edit:hover { background: var(--secondary); color: white; }
  .action-btn.delete { background: #FFF0E8; color: var(--primary); }
  .action-btn.delete:hover { background: var(--primary); color: white; }

  /* 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-section {
    margin-bottom: 20px;
  }

  .modal-section label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .modal-section input, .modal-section textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal-section input:focus, .modal-section textarea:focus {
    border-color: var(--primary);
  }

  .modal-section textarea { resize: vertical; min-height: 80px; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .suggestion-chip {
    padding: 6px 12px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .suggestion-chip.hanwoo-chip {
    background: var(--primary-light);
    color: var(--primary);
    border-color: #f5c5aa;
  }

  .suggestion-chip.hanwoo-chip:hover {
    background: var(--primary);
    color: white;
  }

  .suggestion-chip.chicken-chip {
    background: var(--secondary-light);
    color: var(--secondary);
    border-color: #b8e0ce;
  }

  .suggestion-chip.chicken-chip:hover {
    background: var(--secondary);
    color: white;
  }

  .suggestion-chip.other-chip {
    background: #F0EEFF;
    color: #8B6FE8;
    border-color: #d4c8f8;
  }

  .suggestion-chip.other-chip:hover {
    background: #8B6FE8;
    color: white;
  }

  .suggestion-chip.veggie-chip {
    background: #FFFAE8;
    color: #C49A1A;
    border-color: #f0de8a;
  }

  .suggestion-chip.veggie-chip:hover {
    background: #C49A1A;
    color: white;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }

  .bottom-bar-info {
    font-size: 13px;
    color: var(--text-light);
  }

  .bottom-bar-actions { display: flex; gap: 10px; }

  .toast {
    position: fixed;
    top: 80px;
    right: 24px;
    background: #2D2D2D;
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 300;
    transform: translateX(120%);
    transition: transform 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateX(0); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 12px;
    color: var(--text-light);
    font-size: 15px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .conflict-badge {
    background: #FFF0E8;
    color: var(--primary);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; margin-bottom: 20px; }

  pb { padding-bottom: 100px; display: block; }

  .day-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    margin-bottom: 2px;
  }

  .day-date {
    font-size: 18px;
    font-weight: 700;
  }

  .category-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
  }

  .tag-hanwoo { background: var(--primary-light); color: var(--primary); }
  .tag-chicken { background: var(--secondary-light); color: var(--secondary); }
  .tag-other { background: #F0EEFF; color: #8B6FE8; }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 18px 6px;
    border-bottom: 1px solid var(--border);
  }

  .yusik-item {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .yusik-item:last-child { border-bottom: none; }

  .yusik-name {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
  }

  .yusik-ingredients {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span>🍚</span> 까꿍 디미방 메뉴 생성기</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost" onclick="printMenu()">🖨️ 인쇄</button>
    <button class="btn btn-primary" onclick="generateMenu()">✨ 새 메뉴 생성</button>
  </div>
</header>

<div class="container">
  <div class="week-selector">
    <label>주차 선택</label>
    <input type="date" id="weekStart" onchange="updateWeekDates()">
    <span style="font-size:14px;color:var(--text-light)">~</span>
    <input type="date" id="weekEnd" readonly style="background:#f9f9f9">
    <button class="btn btn-primary" style="margin-left:auto" onclick="generateMenu()">이 주차 메뉴 생성</button>
  </div>

  <div id="menuContainer">
    <div class="empty-state">
      <div class="emoji">🌿</div>
      <p>날짜를 선택하고 메뉴를 생성해보세요!</p>
      <button class="btn btn-primary" onclick="generateMenu()">✨ 지금 생성하기</button>
    </div>
  </div>
  <pb></pb>
</div>

<div class="bottom-bar">
  <div class="bottom-bar-info" id="bottomInfo">메뉴를 생성하면 편집할 수 있어요</div>
  <div class="bottom-bar-actions">
    <button class="btn btn-ghost" onclick="checkConflicts()">🔍 재료 중복 확인</button>
    <button class="btn btn-secondary" onclick="saveMenu()">💾 저장하기</button>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 메뉴 편집</h3>
    <div class="modal-section">
      <label>메뉴 이름</label>
      <input type="text" id="editName" placeholder="예: 한우 브로콜리 죽">
    </div>
    <div class="modal-section">
      <label>재료</label>
      <textarea id="editIngredients" placeholder="예: 한우, 브로콜리 쥬키니호박, 양파 한우육수, 채소상탕"></textarea>
    </div>
    <div class="modal-section" id="suggestionsSection">
      <label>대체 재료 추천</label>
      <div class="suggestions" id="suggestionsList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentMenu = null;
let editTarget = null;
let weekDates = [];

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}

function formatDate(date) {
  return date.toISOString().split('T')[0];
}

function formatKorDate(date) {
  const days = ['일','월','화','수','목','금','토'];
  return `${date.getMonth()+1}월 ${date.getDate()}일(${days[date.getDay()]})`;
}

function updateWeekDates() {
  const start = new Date(document.getElementById('weekStart').value);
  const monday = getMonday(start);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  document.getElementById('weekStart').value = formatDate(monday);
  document.getElementById('weekEnd').value = formatDate(friday);
}

function initDatePicker() {
  const today = new Date();
  const monday = getMonday(today);
  const nextMonday = new Date(monday);
  nextMonday.setDate(monday.getDate() + 7);
  const friday = new Date(nextMonday);
  friday.setDate(nextMonday.getDate() + 4);
  document.getElementById('weekStart').value = formatDate(nextMonday);
  document.getElementById('weekEnd').value = formatDate(friday);
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function pick(arr, exclude = []) {
  const filtered = arr.filter(x => !exclude.includes(x));
  return filtered[Math.floor(Math.random() * filtered.length)];
}

function generateMenu() {
  const startVal = document.getElementById('weekStart').value;
  if (!startVal) { showToast('⚠️ 날짜를 먼저 선택해주세요'); return; }

  const monday = new Date(startVal);
  const days = [];
  const usedVeggies = [];

  // 사용할 단백질3 카테고리 순서 (4일 중 겹치지 않게)
  const beanPool = shuffle(DATA.protein3_bean);
  const fishPool = shuffle(DATA.protein3_fish);
  const grainPool = shuffle(DATA.protein3_grain);
  const etcPool = shuffle(DATA.protein3_etc);
  const p3Pool = [beanPool[0], fishPool[0], grainPool[0], grainPool[1]];

  const dayNames = ['월','화','수','목','금'];
  const iuSikDays = [0,1,3,4]; // 월화목금
  const yusikDay = 2; // 수

  for (let i = 0; i < 5; i++) {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);

    if (i === yusikDay) {
      // 유아식
      const shuffledMain = shuffle(DATA.yusik_main);
      const mainMenus = shuffledMain.slice(0,5);
      const soup = DATA.yusik_soup[Math.floor(Math.random() * DATA.yusik_soup.length)];
      days.push({ type: 'yusik', date, dayName: dayNames[i], items: mainMenus, soup });
    } else {
      // 이유식
      const idx = iuSikDays.indexOf(i);
      const hw_main = pick(DATA.hanwoo_veggie, usedVeggies);
      usedVeggies.push(hw_main);
      const hw_sub = pick(DATA.sub_veggie, usedVeggies);
      usedVeggies.push(hw_sub);

      const ck_main = pick(DATA.chicken_veggie, usedVeggies);
      usedVeggies.push(ck_main);
      const ck_sub = pick(DATA.sub_veggie, usedVeggies);
      usedVeggies.push(ck_sub);

      const p3 = p3Pool[idx] || pick(DATA.protein3_grain, usedVeggies);
      const p3_main = pick(DATA.sub_veggie, usedVeggies);
      usedVeggies.push(p3_main);
      const p3_sub = pick(DATA.sub_veggie, usedVeggies);
      usedVeggies.push(p3_sub);

      days.push({
        type: 'yushik',
        date,
        dayName: dayNames[i],
        menus: [
          { name: `한우 ${hw_main} 죽/무른밥/진밥`, ingredients: `한우, ${hw_main} ${hw_sub}, 양파 한우육수, 채소상탕`, type: 'hanwoo' },
          { name: `닭가슴살 ${ck_main} 죽/무른밥/진밥`, ingredients: `닭가슴살, ${ck_main} ${ck_sub}, 양파 닭육수, 채소상탕`, type: 'chicken' },
          { name: `${p3} ${p3_main} 죽/무른밥/진밥`, ingredients: `${p3}, ${p3_main} ${p3_sub}, 양파, 채소상탕`, type: 'other' }
        ]
      });
    }
  }

  currentMenu = days;
  renderMenu();
  document.getElementById('bottomInfo').textContent = `${formatKorDate(monday)} ~ ${formatKorDate(new Date(monday.getTime() + 4*86400000))} 메뉴`;
}

function renderMenu() {
  if (!currentMenu) return;
  const container = document.getElementById('menuContainer');
  container.innerHTML = '<div class="days-grid">' + currentMenu.map((day, di) => renderDay(day, di)).join('') + '</div>';
}

function renderDay(day, di) {
  const dateStr = formatKorDate(day.date);

  if (day.type === 'yusik') {
    const itemsHtml = day.items.map((item, ii) => `
      <div class="yusik-item">
        <div style="flex:1">
          <div class="yusik-name">${ii+1}. ${item.name}</div>
          <div class="yusik-ingredients">${item.ingredients}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="action-btn edit" onclick="openEditYusik(${di},${ii})">✏️</button>
          <button class="action-btn delete" onclick="deleteYusik(${di},${ii})">✕</button>
        </div>
      </div>
    `).join('');

    return `
      <div class="day-card">
        <div class="day-header yusik-day">
          <div>
            <div class="day-label">유아식</div>
            <div class="day-date">${dateStr}</div>
          </div>
          <span class="yusik-label">반찬5+국1</span>
        </div>
        <div class="section-title">반찬 메뉴</div>
        ${itemsHtml}
        <div class="section-title">국</div>
        <div class="yusik-item">
          <div style="flex:1">
            <div class="yusik-name">${day.soup.name}</div>
            <div class="yusik-ingredients">${day.soup.ingredients}</div>
          </div>
          <button class="action-btn edit" onclick="openEditSoup(${di})">✏️</button>
        </div>
        <div style="padding:10px 18px;font-size:12px;color:var(--text-light);background:#f9f9f9;border-radius:0 0 16px 16px">
          💰 반찬5개 + 국1개 = 35,000원
        </div>
      </div>
    `;
  }

  const menusHtml = day.menus.map((menu, mi) => {
    const numClass = menu.type === 'hanwoo' ? 'hanwoo' : menu.type === 'chicken' ? 'chicken' : 'other';
    const tagClass = menu.type === 'hanwoo' ? 'tag-hanwoo' : menu.type === 'chicken' ? 'tag-chicken' : 'tag-other';
    const tagLabel = menu.type === 'hanwoo' ? '한우' : menu.type === 'chicken' ? '닭가슴살' : '기타단백질';
    const num = mi + 1;
    return `
      <div class="menu-item">
        <div class="menu-num ${numClass}">${num}</div>
        <div class="menu-content">
          <div class="menu-name">
            ${menu.name.replace(' 죽/무른밥/진밥','')}
            <span class="category-tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="menu-ingredients">${menu.ingredients}</div>
        </div>
        <div class="menu-actions">
          <button class="action-btn edit" onclick="openEdit(${di},${mi})">✏️</button>
          <button class="action-btn delete" onclick="openReplaceModal(${di},${mi})">🔄</button>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="day-card">
      <div class="day-header" style="background:linear-gradient(135deg,#FDF0E8,#FDE8D8);">
        <div>
          <div class="day-label" style="color:#999">이유식</div>
          <div class="day-date" style="color:#2D2D2D">${dateStr}</div>
        </div>
        <span style="font-size:11px;background:var(--primary-light);color:var(--primary);padding:4px 10px;border-radius:20px;font-weight:600">중기·후기·완료기</span>
      </div>
      ${menusHtml}
    </div>
  `;
}

function openEdit(di, mi) {
  editTarget = { type: 'menu', di, mi };
  const menu = currentMenu[di].menus[mi];
  document.getElementById('editName').value = menu.name.replace(' 죽/무른밥/진밥', '');
  document.getElementById('editIngredients').value = menu.ingredients;
  showSuggestions(menu.type);
  document.getElementById('editModal').classList.add('active');
}

function openEditYusik(di, ii) {
  editTarget = { type: 'yusik', di, ii };
  const item = currentMenu[di].items[ii];
  document.getElementById('editName').value = item.name;
  document.getElementById('editIngredients').value = item.ingredients;
  document.getElementById('suggestionsList').innerHTML = DATA.yusik_main.slice(0,8).map(m =>
    `<span class="suggestion-chip other-chip" onclick="applyYusikSuggestion('${m.name}','${m.ingredients}')">${m.name}</span>`
  ).join('');
  document.getElementById('editModal').classList.add('active');
}

function openEditSoup(di) {
  editTarget = { type: 'soup', di };
  const soup = currentMenu[di].soup;
  document.getElementById('editName').value = soup.name;
  document.getElementById('editIngredients').value = soup.ingredients;
  document.getElementById('suggestionsList').innerHTML = DATA.yusik_soup.map(s =>
    `<span class="suggestion-chip chicken-chip" onclick="applySoupSuggestion('${s.name}','${s.ingredients}')">${s.name}</span>`
  ).join('');
  document.getElementById('editModal').classList.add('active');
}

function openReplaceModal(di, mi) {
  editTarget = { type: 'menu', di, mi };
  const menu = currentMenu[di].menus[mi];
  document.getElementById('editName').value = '';
  document.getElementById('editIngredients').value = '';
  showSuggestions(menu.type);
  document.getElementById('editModal').classList.add('active');
}

function showSuggestions(type) {
  const list = document.getElementById('suggestionsList');
  if (type === 'hanwoo') {
    list.innerHTML = DATA.hanwoo_veggie.map(v =>
      `<span class="suggestion-chip hanwoo-chip" onclick="applyVeggie('${v}','${type}')">${v}</span>`
    ).join('');
  } else if (type === 'chicken') {
    list.innerHTML = DATA.chicken_veggie.map(v =>
      `<span class="suggestion-chip chicken-chip" onclick="applyVeggie('${v}','${type}')">${v}</span>`
    ).join('');
  } else {
    const allP3 = [...DATA.protein3_bean, ...DATA.protein3_fish, ...DATA.protein3_grain, ...DATA.protein3_etc];
    list.innerHTML = allP3.map(v =>
      `<span class="suggestion-chip other-chip" onclick="applyProtein3('${v}')">${v}</span>`
    ).join('');
  }
}

function applyVeggie(veggie, type) {
  const { di, mi } = editTarget;
  const menu = currentMenu[di].menus[mi];
  const baseName = type === 'hanwoo' ? '한우' : '닭가슴살';
  const육수 = type === 'hanwoo' ? '한우육수' : '닭육수';
  const sub = pick(DATA.sub_veggie, [veggie]);
  document.getElementById('editName').value = `${baseName} ${veggie}`;
  document.getElementById('editIngredients').value = `${baseName}, ${veggie} ${sub}, 양파 ${육수}, 채소상탕`;
}

function applyProtein3(protein) {
  const sub1 = pick(DATA.sub_veggie, []);
  const sub2 = pick(DATA.sub_veggie, [sub1]);
  document.getElementById('editName').value = `${protein} ${sub1}`;
  document.getElementById('editIngredients').value = `${protein}, ${sub1} ${sub2}, 양파, 채소상탕`;
}

function applyYusikSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  document.getElementById('editIngredients').value = ingredients;
}

function applySoupSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  document.getElementById('editIngredients').value = ingredients;
}

function saveEdit() {
  const name = document.getElementById('editName').value.trim();
  const ingredients = document.getElementById('editIngredients').value.trim();
  if (!name) { showToast('⚠️ 메뉴 이름을 입력해주세요'); return; }

  if (editTarget.type === 'menu') {
    const { di, mi } = editTarget;
    const menu = currentMenu[di].menus[mi];
    const suffix = menu.type === 'hanwoo' || menu.type === 'chicken' ? ' 죽/무른밥/진밥' : ' 죽/무른밥/진밥';
    menu.name = name.includes('죽') ? name : name + suffix;
    if (ingredients) menu.ingredients = ingredients;
  } else if (editTarget.type === 'yusik') {
    const { di, ii } = editTarget;
    currentMenu[di].items[ii].name = name;
    if (ingredients) currentMenu[di].items[ii].ingredients = ingredients;
  } else if (editTarget.type === 'soup') {
    const { di } = editTarget;
    currentMenu[di].soup.name = name;
    if (ingredients) currentMenu[di].soup.ingredients = ingredients;
  }

  renderMenu();
  closeModal('editModal');
  showToast('✅ 메뉴가 수정됐어요');
}

function deleteYusik(di, ii) {
  if (currentMenu[di].items.length <= 3) {
    showToast('⚠️ 최소 3개는 있어야 해요');
    return;
  }
  currentMenu[di].items.splice(ii, 1);
  renderMenu();
  showToast('🗑️ 메뉴가 삭제됐어요');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}

function checkConflicts() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }
  const all = [];
  currentMenu.forEach(day => {
    if (day.type === 'yushik') {
      day.menus.forEach(m => {
        m.ingredients.split(/[,\s]+/).forEach(i => { if (i.length > 1) all.push(i); });
      });
    }
  });
  const counts = {};
  all.forEach(i => counts[i] = (counts[i]||0)+1);
  const dups = Object.entries(counts).filter(([k,v]) => v > 1 && !['양파','채소상탕','한우육수','닭육수'].includes(k));
  if (dups.length === 0) {
    showToast('✅ 재료 중복 없음! 완벽해요');
  } else {
    showToast(`⚠️ 중복 재료: ${dups.map(d=>d[0]).join(', ')}`);
  }
}

function saveMenu() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }
  showToast('💾 저장됐어요! (로컬 저장)');
  localStorage.setItem('kkakung_menu', JSON.stringify(currentMenu));
}

function printMenu() {
  window.print();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal('editModal');
});

initDatePicker();
</script>
</body>
