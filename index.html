<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>까꿍 디미방 메뉴 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Dodum&display=swap');
:root {
  --bg: #FDF8F3;
  --card: #FFFFFF;
  --primary: #E8845A;
  --primary-light: #FFF0E8;
  --secondary: #6BAE8E;
  --secondary-light: #EBF7F2;
  --text: #2D2D2D;
  --text-light: #888;
  --border: #EDE8E0;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header {
  background: white; border-bottom: 1px solid var(--border);
  padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.logo { font-family: 'Gowun Dodum', sans-serif; font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.logo span { font-size: 24px; }
.btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #d4714a; transform: translateY(-1px); }
.btn-secondary { background: var(--secondary); color: white; }
.btn-secondary:hover { background: #5a9a7c; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); }
.btn-ghost.active { background: #FFF3CD; color: #856404; border-color: #FFCC02; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.week-selector {
  background: white; border-radius: var(--radius); padding: 14px 18px;
  margin-bottom: 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.week-btn {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; background: white; color: var(--text); transition: all 0.2s; white-space: nowrap;
}
.week-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
.week-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
.day-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; }
.day-card:hover { transform: translateY(-2px); }
.day-header { padding: 14px 18px; font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: space-between; }
.day-label { font-size: 12px; font-weight: 500; color: var(--text-light); margin-bottom: 2px; }
.day-date { font-size: 18px; font-weight: 700; }
.menu-item { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; position: relative; }
.menu-item:last-child { border-bottom: none; }
.menu-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.menu-num.hanwoo { background: #FFF0E8; color: var(--primary); }
.menu-num.chicken { background: #EBF7F2; color: var(--secondary); }
.menu-num.other { background: #F0EEFF; color: #8B6FE8; }
.menu-content { flex: 1; }
.menu-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.menu-ingredients { font-size: 12px; color: var(--text-light); line-height: 1.5; }
.menu-actions { display: flex; gap: 4px; opacity: 1; }
.action-btn { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
.action-btn.edit { background: #EBF7F2; color: var(--secondary); }
.action-btn.edit:hover { background: var(--secondary); color: white; }
.action-btn.delete { background: #FFF0E8; color: var(--primary); }
.action-btn.delete:hover { background: var(--primary); color: white; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: var(--radius); padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.2s ease; }
@keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.modal-section { margin-bottom: 20px; }
.modal-section label { display: block; font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-section input, .modal-section textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
.modal-section input:focus, .modal-section textarea:focus { border-color: var(--primary); }
.modal-section textarea { resize: vertical; min-height: 80px; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.suggestion-chip { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
.suggestion-chip.hanwoo-chip { background: var(--primary-light); color: var(--primary); border-color: #f5c5aa; }
.suggestion-chip.hanwoo-chip:hover { background: var(--primary); color: white; }
.suggestion-chip.chicken-chip { background: var(--secondary-light); color: var(--secondary); border-color: #b8e0ce; }
.suggestion-chip.chicken-chip:hover { background: var(--secondary); color: white; }
.suggestion-chip.other-chip { background: #F0EEFF; color: #8B6FE8; border-color: #d4c8f8; }
.suggestion-chip.other-chip:hover { background: #8B6FE8; color: white; }
/* 재료 칩 에디터 */
.chip-editor {
  min-height: 44px; border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  transition: border-color 0.2s; cursor: default;
}
.chip-editor.has-selection { border-color: var(--primary); }
.ingred-chip {
  padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 500;
  cursor: pointer; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); transition: all 0.15s; user-select: none;
}
.ingred-chip:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.ingred-chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
.chip-text-input {
  border: none; outline: none; font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; background: transparent; padding: 0 4px; color: white; min-width: 40px;
}
.chip-picker {
  display: none; flex-wrap: wrap; gap: 6px; margin-top: 8px; padding: 10px 12px;
  background: var(--bg); border-radius: 10px; border: 1px solid var(--border);
}
.chip-picker.active { display: flex; }
.chip-picker-label { font-size: 11px; color: var(--text-light); width: 100%; margin-bottom: 2px; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.menu-container-hidden { display: none !important; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
.bottom-bar-info { font-size: 13px; color: var(--text-light); }
.bottom-bar-actions { display: flex; gap: 10px; }
.toast { position: fixed; top: 80px; right: 24px; background: #2D2D2D; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 300; transform: translateX(120%); transition: transform 0.3s; display: flex; align-items: center; gap: 8px; }
.toast.show { transform: translateX(0); }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; padding: 10px 18px 6px; border-bottom: 1px solid var(--border); }
.yusik-item { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.yusik-item:last-child { border-bottom: none; }
.yusik-name { font-size: 13px; font-weight: 600; flex: 1; }
.yusik-ingredients { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.category-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.tag-hanwoo { background: var(--primary-light); color: var(--primary); }
.tag-chicken { background: var(--secondary-light); color: var(--secondary); }
.tag-other { background: #F0EEFF; color: #8B6FE8; }
.history-badge { font-size: 10px; background: #fff3cd; color: #856404; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
pb { padding-bottom: 100px; display: block; }

html, body { overflow-x: hidden; }

@media (max-width: 600px) {
  header { padding: 10px 10px; }
  .logo { font-size: 13px; white-space: nowrap; }
  .logo span { font-size: 16px; }
  header > div { gap: 4px; flex-shrink: 0; }
  header .btn { padding: 6px 8px; font-size: 11px; white-space: nowrap; }

  .container { padding: 12px 10px; }

  .week-selector { padding: 10px 10px; gap: 5px; flex-wrap: wrap; }
  .week-btn { padding: 6px 8px; font-size: 11px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; }

  .bottom-bar { padding: 6px 10px; flex-wrap: nowrap; gap: 4px; }
  .bottom-bar-info { display: none; }
  .bottom-bar-actions { display: flex; gap: 4px; width: 100%; }
  .bottom-bar-actions .btn { flex: 1; padding: 7px 2px; font-size: 10px; text-align: center; white-space: nowrap; min-width: 0; }

  .history-panel { padding: 12px 10px; margin-bottom: 16px; }
  .days-grid { grid-template-columns: 1fr; gap: 12px; }

  pb { padding-bottom: 60px; display: block; }
}

/* 히스토리 패널 */
.history-panel { background: white; border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
.history-panel h4 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-light); }
.history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.history-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.history-tag.week1 { background: #ffe0d0; color: #c0532a; }
.history-tag.week2 { background: #ffefd5; color: #a0732a; }
.history-tag.week3 { background: #fff9e0; color: #8a7a2a; }
.history-tag.week4 { background: #f0f8e8; color: #4a7a2a; }
.history-tag.week5 { background: #e8f4f0; color: #2a6a5a; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<header>
  <div class="logo"><span>🍚</span> 까꿍 디미방</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-primary" onclick="generateMenu()">🎲 메뉴 새로 뽑기</button>
  </div>
</header>

<div class="container">
  <!-- 숨겨진 주차값 (기존 코드 호환) -->
  <input type="hidden" id="weekStart">
  <input type="hidden" id="weekEnd">
  <div class="week-selector" id="weekBtns"></div>

  <div id="historyPanel" style="display:block" class="history-panel">
    <div id="historyQuickButtons" style="display:none"></div>
    <select id="historyWeekSelect" style="display:none"></select>
    <div id="historyContent" style="font-size:13px;color:var(--text-light);"></div>
  </div>

  <div id="menuContainer" class="menu-container-hidden">
    <div style="text-align:center;padding:60px 20px;color:var(--text-light)">
      <div style="font-size:48px;margin-bottom:16px">🌿</div>
      <p style="font-size:15px;margin-bottom:20px">날짜를 선택하고 메뉴를 생성해보세요!</p>
      <button class="btn btn-primary" onclick="generateMenu()">✨ 지금 생성하기</button>
    </div>
  </div>
  <pb></pb>
</div>

<div class="bottom-bar">
  <div class="bottom-bar-info" id="bottomInfo">메뉴를 생성하면 편집할 수 있어요</div>
  <div class="bottom-bar-actions">
    <button class="btn btn-ghost" onclick="printMenuTable()" style="background:#e8f4e8;color:#2a7a2a;border-color:#8ac08a;">🖨️ 메뉴표 인쇄 / PDF</button>
    <button class="btn btn-ghost" onclick="resetToSaved()" style="color:var(--primary)">↩️ 원복</button>
    <button class="btn btn-secondary" onclick="saveMenu()">💾 이번 주 저장</button>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 메뉴 편집</h3>
    <div class="modal-section">
      <label>메뉴 이름</label>
      <input type="text" id="editName" placeholder="예: 한우 브로콜리 죽">
    </div>
    <div class="modal-section">
      <label>재료 <span style="font-size:11px;color:var(--text-light);font-weight:400;text-transform:none;letter-spacing:0">누르면 선택 · 다시 누르면 직접입력</span></label>
      <div class="chip-editor" id="chipEditorArea"></div>
      <div class="chip-picker" id="chipPicker"></div>
      <textarea id="editIngredients" style="display:none"></textarea>
    </div>
    <div class="modal-section">
      <label>원산지</label>
      <input type="text" id="editOrigin" placeholder="예: 소고기호주산, 단호박뉴질랜드, 당근국내산">
    </div>
    <div class="modal-section" id="suggestionsSection">
      <label>추천 선택</label>
      <div class="suggestions" id="suggestionsList"></div>
    </div>
    <div class="modal-section" id="midNoteSection" style="display:none">
      <label>중기 주의 <span style="font-size:11px;color:var(--text-light);font-weight:400;text-transform:none;letter-spacing:0">알러지·단계 차이 있으면 입력</span></label>
      <input type="text" id="editMidNote" placeholder="예: 새우 제외" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const CACHE_KEY = 'kkakung_history_v3';

// 주차별 row(id=YYYY-MM-DD) 모두 로드 → 통합 history 형태 반환
async function loadHistory() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=like.20*&select=*&order=id.asc&limit=${MAX_WEEKS + 1}`, {
      headers: SB_HEADERS
    });
    if (!res.ok) throw new Error('load HTTP ' + res.status);
    const rows = await res.json();
    const yusik = rows.map(r => ({
      weekKey: r.id,
      menus: (r.yusik && r.yusik.menus) || (Array.isArray(r.yusik) ? [] : []),
      schedule: (r.yusik && r.yusik.schedule) || null
    }));
    const yushik_veggie = rows.map(r => ({
      weekKey: r.id,
      hanwoo: (r.yushik_veggie && r.yushik_veggie.hanwoo) || [],
      chicken: (r.yushik_veggie && r.yushik_veggie.chicken) || [],
      p3: (r.yushik_veggie && r.yushik_veggie.p3) || []
    }));
    const h = { yusik, yushik_veggie, _serverOk: true };
    localStorage.setItem(CACHE_KEY, JSON.stringify(h));
    return h;
  } catch(e) {
    console.warn('Supabase load failed, fallback to cache', e);
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (cached && cached._serverOk) return { ...cached, _serverOk: false };
    } catch(e2) {}
    // ★ 빈 history로 fallback 안 함 (덮어쓰기 방지). 명시적 에러 표시.
    return { yusik: [], yushik_veggie: [], _serverOk: false, _loadFailed: true };
  }
}

// 한 주 단위 upsert. 단일 row로 저장 → 다른 주 데이터 영향 없음.
async function saveWeek(weekKey, yusikMenus, veggie, schedule) {
  if (!weekKey || !/^\d{4}-\d{2}-\d{2}$/.test(weekKey)) {
    alert('저장 실패: weekKey 형식 오류 (' + weekKey + ')');
    return false;
  }
  const body = {
    id: weekKey,
    yusik: { menus: yusikMenus || [], schedule: schedule || null },
    yushik_veggie: {
      hanwoo: (veggie && veggie.hanwoo) || [],
      chicken: (veggie && veggie.chicken) || [],
      p3: (veggie && veggie.p3) || []
    },
    updated_at: new Date().toISOString()
  };
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history`, {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const txt = await res.text().catch(()=>'');
      alert('저장 실패 (서버 ' + res.status + '): ' + txt.slice(0,150));
      return false;
    }
    // 성공 → 4주 초과 row 정리
    cleanupOldWeeks();
    return true;
  } catch(e) {
    alert('저장 실패 (네트워크): ' + e.message);
    return false;
  }
}

async function cleanupOldWeeks() {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=like.20*&select=id&order=id.desc`, { headers: SB_HEADERS });
    if (!res.ok) return;
    const rows = await res.json();
    if (rows.length <= MAX_WEEKS) return;
    for (const r of rows.slice(MAX_WEEKS)) {
      await fetch(`${SB_URL}/rest/v1/kkakung_history?id=eq.${encodeURIComponent(r.id)}`, {
        method: 'DELETE', headers: SB_HEADERS
      }).catch(()=>{});
    }
  } catch(e) { console.warn('cleanup failed', e); }
}

async function recordThisWeek(weekKey, menuData) {
  const yusikMenus = [];

  const usedHanwoo = [], usedChicken = [], usedP3 = [];

      day.menus.forEach(m => {

  const schedule = menuData.map(day => ({
    date: (day.date instanceof Date) ? day.date.toISOString().slice(0, 10) : day.date,
    type: day.type,
    items: day.type === 'yusik' ? (day.items || []).map(it => ({ name: it.name, ingredients: it.ingredients, origin: it.origin || '' })) : null,

    menus: day.type === 'yushik' ? (day.menus || []).map(m => ({
      type: m.type,
      name: m.displayName || m.name,
      ingredients: m.ingredients,
      mainVeggie: m.mainVeggie || m.mainProtein,
      subVeggie: m.subVeggie
    })) : null
  }));
  // 단일 주차 row upsert — 다른 주 데이터에 영향 없음
  const ok = await saveWeek(weekKey, yusikMenus, { hanwoo: usedHanwoo, chicken: usedChicken, p3: usedP3 }, schedule);
  // 캐시 갱신 (다음 loadHistory 호출 시 최신 반영 위해)
  if (ok) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY)) || { yusik: [], yushik_veggie: [] };
      const yi = (cached.yusik || []).findIndex(w => w.weekKey === weekKey);
      const newYusik = { weekKey, menus: yusikMenus };
      if (yi >= 0) cached.yusik[yi] = newYusik; else (cached.yusik = cached.yusik || []).push(newYusik);
      const vi = (cached.yushik_veggie || []).findIndex(w => w.weekKey === weekKey);
      const newVeg = { weekKey, hanwoo: usedHanwoo, chicken: usedChicken, p3: usedP3 };
      if (vi >= 0) cached.yushik_veggie[vi] = newVeg; else (cached.yushik_veggie = cached.yushik_veggie || []).push(newVeg);
      cached._serverOk = true;
      localStorage.setItem(CACHE_KEY, JSON.stringify(cached));
    } catch(e) {}
  }
}

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// 이유식 재료 — 고정 재료 제거 후 단백질 + 야채만 표시
// 야채가 0개이면 양파도 표시 (데이터가 양파뿐인 경우 빈 화면 방지)
function normalizeYushikIngredients(str, type) {
  const items = (str || '').split(',').map(s => s.trim()).filter(Boolean);
  const proteins = type === 'hanwoo' ? ['한우'] : type === 'chicken' ? ['닭가슴살','닭고기'] : [];
  const broth = type === 'hanwoo' ? '한우육수' : type === 'chicken' ? '닭육수' : '';
  const alwaysHide = [broth, '채소상탕'].filter(Boolean); // 항상 숨김 (표시 가치 없음)
  const seen = new Set();
  const protein = [], veggie = [], softHidden = [];
  for (const x of items) {
    if (!x || seen.has(x) || alwaysHide.includes(x)) continue;
    seen.add(x);
    if (proteins.includes(x)) protein.push(x);
    else if (x === '양파') softHidden.push(x); // 야채 있으면 숨기고, 없으면 표시
    else veggie.push(x);
  }
  if (proteins.length && !protein.length) protein.push(proteins[0]);
  const finalVeggie = veggie.length > 0 ? veggie : softHidden;
  return [...protein, ...finalVeggie].join(', ');
}

function pickExcluding(pool, exclude) {
  const filtered = pool.filter(x => !exclude.includes(x));
  if (filtered.length === 0) return pool[Math.floor(Math.random() * pool.length)]; // 부득이하게
  return filtered[Math.floor(Math.random() * filtered.length)];
}

function buildYushikMenu(dayIndex, usedThisWeek, prevWeek) {
  // prevWeek.hanwoo/chicken/p3 = ["주재료|서브", ...] 형태의 4주 사용 콤보

  function usedSubsFor(comboList, main) {
    return comboList.filter(c => c.split('|')[0] === main).map(c => c.split('|')[1]);
  }

  // 한우 — 이번 주 내 주재료 중복 방지 (주간 겹침), 서브는 4주 콤보 기준
  const hwMain = pickExcluding(HANWOO_MAIN_POOL, usedThisWeek.hanwoo);
  usedThisWeek.hanwoo.push(hwMain);
  const hwSubs = PAIRINGS.hanwoo[hwMain] || ['당근','쥬키니호박','감자'];
  const hwUsedSubs = usedSubsFor(prevWeek.hanwoo, hwMain);
  const hwSub = pickExcluding(hwSubs, ['양파', ...hwUsedSubs]);

  // 닭 — 이번 주 주재료 중복 방지, 서브는 4주 콤보 기준 + hwSub 겹침 방지
  const ckMain = pickExcluding(CHICKEN_MAIN_POOL, usedThisWeek.chicken);
  usedThisWeek.chicken.push(ckMain);
  const ckSubs = PAIRINGS.chicken[ckMain] || ['당근','감자','쥬키니호박'];
  const ckUsedSubs = usedSubsFor(prevWeek.chicken, ckMain);
  const ckSub = pickExcluding(ckSubs, ['양파', hwSub, ...ckUsedSubs]);

  // 기타단백질 — 이번 주 주재료 중복 방지, 서브는 4주 콤보 기준 + 당일 서브 겹침 방지
  const p3Main = pickExcluding(P3_POOL, usedThisWeek.p3);
  usedThisWeek.p3.push(p3Main);
  const p3Subs = PAIRINGS.protein3[p3Main] || ['쥬키니호박','감자','브로콜리'];
  const p3UsedSubs = usedSubsFor(prevWeek.p3, p3Main);
  const p3Sub = pickExcluding(p3Subs, ['당근', '양파', hwSub, ckSub, ...p3UsedSubs]);

  return [
    {
      name: `한우 ${hwMain} 죽/무른밥/진밥`,
      displayName: `한우 ${hwMain}`,
      ingredients: `한우, ${hwMain}, ${hwSub}, 한우육수, 양파, 채소상탕`,
      type: 'hanwoo',
      mainVeggie: hwMain, subVeggie: hwSub
    },
    {
      name: `닭가슴살 ${ckMain} 죽/무른밥/진밥`,
      displayName: `닭가슴살 ${ckMain}`,
      ingredients: `닭가슴살, ${ckMain}, ${ckSub}, 닭육수, 양파, 채소상탕`,
      type: 'chicken',
      mainVeggie: ckMain, subVeggie: ckSub
    },
    {
      name: `${p3Main} ${p3Sub} 죽/무른밥/진밥`,
      displayName: `${p3Main} ${p3Sub}`,
      ingredients: `${p3Main}, ${p3Sub}, 당근, 양파, 채소상탕`,
      type: 'other',
      mainProtein: p3Main, subVeggie: p3Sub
    }
  ];
}

let currentMenu = null;
let editTarget = null;

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}

// 기준: 일요일 00:00부터 이번주 = 다음 월요일 (토요일에 다음주 메뉴 작성 지원)
function getBaseMonday() {
  const now = new Date();
  if (now.getDay() === 0) { // 일요일 → 내일(월요일)이 이번주
    const next = new Date(now);
    next.setDate(now.getDate() + 1);
    return getMonday(next);
  }
  return getMonday(now);
}

function getWeekMondayByOffset(offset) {
  const base = getBaseMonday();
  base.setDate(base.getDate() + offset * 7);
  return base;
}

function buildWeekButtons() {
  const btns = [
    { label: '4주전', offset: -4 },
    { label: '3주전', offset: -3 },
    { label: '2주전', offset: -2 },
    { label: '1주전', offset: -1 },
    { label: '이번주', offset: 0 },
    { label: '다음주', offset: 1 },
  ];
  const box = document.getElementById('weekBtns');
  if (!box) return;
  const curWk = document.getElementById('weekStart').value;
  box.innerHTML = btns.map(b => {
    const mon = getWeekMondayByOffset(b.offset);
    const wk = formatDate(mon);
    const mmdd = `${mon.getMonth()+1}/${mon.getDate()}`;
    const isActive = wk === curWk;
    return `<button class="week-btn${isActive?' active':''}" onclick="selectWeekBtn('${wk}')" data-wk="${wk}">${b.label}<span style="font-size:10px;opacity:0.7;margin-left:3px">${mmdd}</span></button>`;
  }).join('') +
  `<button class="week-btn" onclick="startCompare()" style="margin-left:auto;border-color:rgba(122,36,24,0.4);color:var(--primary);font-weight:700">↔ 전주 비교</button>`;
}

// 현재 weekStart 기준 직전 저장 주차와 비교 모드 진입
async function startCompare() {
  const wk = document.getElementById('weekStart').value;
  if (!wk) { showToast('⚠️ 먼저 주차를 선택해주세요'); return; }
  if (!currentMenu) { showToast('⚠️ 이번 주 메뉴를 먼저 불러와주세요'); return; }
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=like.20*&select=id,yusik&order=id.desc`, { headers: SB_HEADERS });
    const rows = await res.json();
    const prevRow = rows.find(r => r.id < wk && r.yusik?.schedule?.length);
    if (!prevRow) { showToast('비교할 이전 저장 주차가 없어요'); return; }
    const prevSchedule = prevRow.yusik.schedule;
    const fmtPrev = fmtWeekLabel(prevRow.id);
    const fmtCur  = fmtWeekLabel(wk);
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">`;
    html += `<strong style="font-size:14px">↔ ${fmtPrev} vs ${fmtCur}</strong>`;
    html += `<button class="btn btn-ghost" onclick="exitHistoryView()" style="padding:5px 12px;font-size:11px">✕ 닫기</button>`;
    html += `</div>`;
    html += `<button class="btn btn-ghost" onclick="checkHistoryDupes()" style="width:100%;margin-bottom:10px;font-size:12px;background:rgba(122,36,24,0.08);border:1px solid rgba(122,36,24,0.35);color:var(--primary);font-weight:600">🔍 재료 중복 확인</button>`;
    html += `<div id="histDupeResult" style="margin-bottom:10px"></div>`;
    // 토/일 제외 (type=holiday or day.date가 토/일인 것 제외)
    const EXCLUDE = new Set(['한우','닭가슴살','닭고기','한우육수','닭육수','양파','채소상탕','당근','소금','물']);
    function isWeekend(day) {
      if (!day) return false;
      const d = new Date(day.date);
      return d.getDay() === 0 || d.getDay() === 6;
    }
    function getYushikIngreds(schedule) {
      const set = new Set();
      (schedule||[]).forEach(day => {
        if (day.type !== 'yushik' || day.removed) return;
        (day.menus||[]).forEach(m => {
          normalizeYushikIngredients(m.ingredients||'', m.type)
            .split(',').map(s=>s.trim()).filter(Boolean)
            .forEach(x => { if (!EXCLUDE.has(x)) set.add(x); });
        });
      });
      return set;
    }
    // 주 안에서 반복된 야채만 (2일 이상 등장)
    function getIntraWeekDupes(schedule) {
      const counts = {};
      (schedule||[]).forEach(day => {
        if (day.type !== 'yushik' || day.removed) return;
        (day.menus||[]).forEach(m => {
          normalizeYushikIngredients(m.ingredients||'', m.type)
            .split(',').map(s=>s.trim()).filter(Boolean)
            .forEach(x => { if (!EXCLUDE.has(x)) counts[x] = (counts[x]||0)+1; });
        });
      });
      return Object.entries(counts).filter(([,v])=>v>1).map(([k])=>k);
    }
    const prevDupes = getIntraWeekDupes(prevSchedule);
    const curDupes  = getIntraWeekDupes(currentMenu);

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">`;
    html += `<div style="text-align:center;font-size:11px;font-weight:700;padding:6px;background:#f0eae0;border-radius:5px">전주 ${fmtPrev}</div>`;
    html += `<div style="text-align:center;font-size:11px;font-weight:700;padding:6px;background:rgba(139,170,124,0.18);border-radius:5px">이번 주 ${fmtCur}</div>`;
    html += `</div>`;
    html += `<div id="histCompareGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    // 토/일 제외하고 렌더
    const prevFiltered = (prevSchedule||[]).filter(d => !isWeekend(d));
    const curFiltered  = (currentMenu||[]).filter(d => !isWeekend(d));
    const maxLen = Math.max(prevFiltered.length, curFiltered.length);
    for (let i = 0; i < maxLen; i++) {
      html += renderDayCard(prevFiltered[i], '#fdfaf3');
      const cd = curFiltered[i];
      const di = cd ? currentMenu.indexOf(cd) : -1;
      html += cd ? renderEditableDayCard(cd, di >= 0 ? di : i, 'rgba(139,170,124,0.06)') : renderDayCard(null, 'rgba(139,170,124,0.06)');
    }
    html += `</div>`;
    // 주차별 중복 야채 — 중복 있는 경우만 표시
    if (prevDupes.length || curDupes.length) {
      html += `<div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
      if (prevDupes.length) {
        html += `<div style="padding:7px 9px;background:#fdfaf3;border:1px solid #e8dcc0;border-radius:6px;font-size:11px"><span style="font-weight:700;color:var(--text-light)">전주 중복</span><br><span style="color:#b84a1a;font-weight:600">${prevDupes.join(', ')}</span></div>`;
      } else {
        html += `<div></div>`;
      }
      if (curDupes.length) {
        html += `<div style="padding:7px 9px;background:rgba(139,170,124,0.06);border:1px solid rgba(139,170,124,0.35);border-radius:6px;font-size:11px"><span style="font-weight:700;color:var(--text-light)">이번주 중복</span><br><span style="color:#b84a1a;font-weight:600">${curDupes.join(', ')}</span></div>`;
      } else {
        html += `<div></div>`;
      }
      html += `</div>`;
    }
    document.getElementById('historyContent').innerHTML = html;
    window._histCompare = { prevSchedule, thisSchedule: currentMenu };
    window._histCompareActive = true;
    document.getElementById('historyPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) { showToast('비교 로드 실패'); }
}

async function selectWeekBtn(weekKey) {
  document.getElementById('weekStart').value = weekKey;
  updateWeekDates();
  buildWeekButtons(); // active 갱신

  // CUR_KEY에 이 주차 데이터 있으면 로드
  try {
    const saved = JSON.parse(localStorage.getItem(CUR_KEY) || '{}');
    if (saved.weekStart === weekKey && saved.menu && saved.menu.length) {
      saved.menu.forEach(d => { d.date = new Date(d.date); });
      currentMenu = saved.menu;
      window._histCompareActive = false;
      renderCurrentInHistory();
      return;
    }
  } catch(e) {}

  // DB에서 schedule 조회
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=eq.${weekKey}&select=yusik`, { headers: SB_HEADERS });
    const rows = await res.json();
    const sched = rows[0]?.yusik?.schedule;
    if (sched && sched.length) {
      currentMenu = sched.map(d => {
        const date = new Date(d.date);
        const base = { date, dayName: '', type: d.type };
        if (d.removed) return { ...base, removed: true, menus: [] };
        if (d.type === 'yusik') return { ...base, items: d.items || [], soup: d.soup || {name:'',ingredients:''} };
        return { ...base, menus: (d.menus || []).map(m => ({ ...m, displayName: m.name })) };
      });
      persistCurrent();
    } else {
      currentMenu = null;
    }
  } catch(e) { currentMenu = null; }
  window._histCompareActive = false;
  renderCurrentInHistory();
}
function formatDate(date) { return date.toISOString().split('T')[0]; }
function formatKorDate(date) {
  const days = ['일','월','화','수','목','금','토'];
  return `${date.getMonth()+1}월 ${date.getDate()}일(${days[date.getDay()]})`;
}

function updateWeekDates() {
  const start = new Date(document.getElementById('weekStart').value);
  const monday = getMonday(start);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  document.getElementById('weekStart').value = formatDate(monday);
  document.getElementById('weekEnd').value = formatDate(friday);
}

function initDatePicker() {
  // 이번주 자동 선택 (일요일이면 다음 주)
  const base = getBaseMonday();
  document.getElementById('weekStart').value = formatDate(base);
  updateWeekDates();
  buildWeekButtons();
}

async function generateMenu() {
  const startVal = document.getElementById('weekStart').value;
  if (!startVal) { showToast('⚠️ 날짜를 먼저 선택해주세요'); return; }

  // 이미 저장된 주차인지 확인 — 저장된 기록은 보존이 원칙
  const alreadySaved = await isWeekSaved(startVal);
  if (alreadySaved) {
    if (!confirm(`⚠️ 이미 저장된 주차예요!\n\n기록된 메뉴를 새로 뽑으면\n히스토리가 바뀝니다.\n\n계속 새로 뽑을까요?`)) return;
  } else if (currentMenu && currentMenu.length) {
    if (!confirm('현재 보이는 메뉴를 새 메뉴로 다시 뽑을까요?\n\n[확인] 새 메뉴 뽑기\n[취소] 그대로 유지')) return;
  }

  showToast('⏳ 히스토리 불러오는 중...');

  const monday = new Date(startVal);
  const weekKey = formatDate(monday);

  const [usedYusikNames, prevWeek] = await Promise.all([getUsedYusikNames(), getPrevWeekVeggies()]);

  const usedThisWeek = { hanwoo: [], chicken: [], p3: [] };

  const availableYusik = YUSIK_MAIN.filter(m => !usedYusikNames.has(m.name));
  const yusikPool = availableYusik.length >= 5 ? availableYusik : YUSIK_MAIN;

  const shuffledYusik = shuffle(yusikPool);
  const shuffledSoup = shuffle(YUSIK_SOUP);

  const dayNames = ['월','화','수','목','금'];
  const days = [];
  // 양력 고정 공휴일 자동 처리
  const FIXED_HOLIDAYS = new Set(['01-01','03-01','05-01','05-05','06-06','08-15','10-03','10-09','12-25']);
  const isHoliday = d => FIXED_HOLIDAYS.has(`${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  let yusikAssigned = false;

  for (let i = 0; i < 5; i++) {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);

    if (isHoliday(date)) {
      days.push({ type: 'yushik', date, dayName: dayNames[i], menus: [], removed: true });
    } else if (i === 2 && !yusikAssigned) {
      yusikAssigned = true;
      const items = shuffledYusik.slice(0, 5);
      const soup = shuffledSoup[0];
      days.push({ type: 'yusik', date, dayName: dayNames[i], items, soup });
    } else {
      const menus = buildYushikMenu(i, usedThisWeek, prevWeek);
      days.push({ type: 'yushik', date, dayName: dayNames[i], menus });
    }
  }

  currentMenu = days;
  renderMenu();
  document.getElementById('bottomInfo').textContent =
    `${formatKorDate(monday)} ~ ${formatKorDate(new Date(monday.getTime() + 4*86400000))} 메뉴 (미저장)`;
}

const CUR_KEY = 'kkakung_current_menu';

function persistCurrent() {
  if (!currentMenu) return;
  const weekStart = document.getElementById('weekStart').value;
  localStorage.setItem(CUR_KEY, JSON.stringify({ weekStart, menu: currentMenu }));
}

function restoreCurrent() {
  try {
    const saved = JSON.parse(localStorage.getItem(CUR_KEY));
    if (!saved || !saved.menu) return;
    // 저장된 주차가 현재 주차와 다르면 무시 (다른 컴퓨터에서 이전 주차 복원 방지)
    const curWeek = document.getElementById('weekStart').value;
    if (saved.weekStart !== curWeek) return;
    saved.menu.forEach(day => { day.date = new Date(day.date); });
    currentMenu = saved.menu;
    updateWeekDates();
    buildWeekButtons();
    renderMenu();
  } catch(e) {}
}

// 임시 편집 취소 — CUR_KEY 지우고 DB 저장 데이터로 복원
async function resetToSaved() {
  const weekKey = document.getElementById('weekStart').value;
  if (!weekKey) { showToast('⚠️ 날짜를 먼저 선택해주세요'); return; }
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=eq.${weekKey}&select=yusik`, { headers: SB_HEADERS });
    if (!res.ok) throw new Error();
    const rows = await res.json();
    const sched = rows[0]?.yusik?.schedule;
    if (!sched || !sched.length) {
      // DB 저장 없으면 로컬 초기화만
      localStorage.removeItem(CUR_KEY);
      currentMenu = null;
      renderMenu();
      showToast('↩️ 초기화됐어요 (저장된 데이터 없음)');
      return;
    }
    // DB schedule → currentMenu 변환
    currentMenu = sched.map(d => {
      const date = new Date(d.date);
      const base = { date, dayName: '', type: d.type };
      if (d.removed) return { ...base, removed: true, menus: [] };
      if (d.type === 'yusik') return { ...base, items: d.items || [], soup: d.soup || {name:'',ingredients:''} };
      return { ...base, menus: (d.menus || []).map(m => ({ ...m, displayName: m.name })) };
    });
    document.getElementById('weekStart').value = weekKey;
    updateWeekDates();
    // 비교 모드 종료 후 단독 편집 뷰로 복원
    window._histCompareActive = false;
    window._histCompare = null;
    persistCurrent(); // 복원된 메뉴를 CUR_KEY에 저장 → 새로고침 후에도 유지
    renderCurrentInHistory();
    showToast('↩️ DB 저장 상태로 원복됐어요');
  } catch(e) {
    localStorage.removeItem(CUR_KEY);
    currentMenu = null;
    renderMenu();
    showToast('↩️ 로컬 초기화됐어요');
  }
}

function renderMenu() {
  if (!currentMenu) return;
  persistCurrent();
  // 비교 모드 중이면 개별 카드 갱신만 (renderSelectedWeek가 관리)
  if (window._histCompareActive) return;
  // historyContent에 이번주 단독 편집 뷰 표시
  renderCurrentInHistory();
}

// ===== 칩 에디터 =====
let editChips = [];
let selectedChipIdx = -1;
let chipTypingIdx = -1;

function initChipEditor(ingredStr) {
  editChips = (ingredStr || '').split(',').map(s => s.trim()).filter(Boolean);
  selectedChipIdx = -1;
  chipTypingIdx = -1;
  addingMode = false;
  renderChipEditor();
  document.getElementById('chipPicker').className = 'chip-picker';
}

function renderChipEditor() {
  const area = document.getElementById('chipEditorArea');
  const addingActive = addingMode ? ';background:var(--primary);color:white;opacity:1' : '';
  const addBtn = `<span class="ingred-chip" onclick="addChip()" style="opacity:0.6;font-size:12px;padding:4px 12px${addingActive}">추가</span>`;
  area.innerHTML = editChips.map((chip, i) => {
    if (i === chipTypingIdx) {
      const w = Math.max(44, chip.length * 13);
      return `<span class="ingred-chip selected" style="padding:3px 8px">` +
        `<input class="chip-text-input" id="cti" value="${chip.replace(/"/g,'&quot;')}" ` +
        `onblur="finalizeChipTyping(${i})" ` +
        `onkeydown="if(event.key==='Enter'||event.key==='Tab'){event.preventDefault();finalizeChipTyping(${i})}" ` +
        `style="width:${w}px"></span>`;
    }
    const sel = i === selectedChipIdx ? ' selected' : '';
    return `<span class="ingred-chip${sel}" style="display:inline-flex;align-items:center;gap:4px">` +
      `<span onclick="onChipClick(${i})">${chip}</span>` +
      `<span onclick="removeChip(${i})" style="opacity:0.5;font-size:10px;cursor:pointer;line-height:1" title="삭제">✕</span>` +
      `</span>`;
  }).join('');
  area.innerHTML += addBtn;
  area.classList.toggle('has-selection', selectedChipIdx >= 0 || chipTypingIdx >= 0);
  syncChipsToTextarea();
  if (chipTypingIdx >= 0) setTimeout(() => { const el = document.getElementById('cti'); if (el){el.focus();el.select();} }, 0);
}

function onChipClick(idx) {
  if (chipTypingIdx === idx) return;
  if (selectedChipIdx === idx) {
    // 이미 선택된 칩 다시 클릭 → 직접입력
    chipTypingIdx = idx;
    renderChipEditor();
    document.getElementById('chipPicker').className = 'chip-picker';
  } else {
    chipTypingIdx = -1;
    selectedChipIdx = idx;
    renderChipEditor();
    showChipPicker(idx);
  }
}

function finalizeChipTyping(idx) {
  const el = document.getElementById('cti');
  if (el && el.value.trim()) editChips[idx] = el.value.trim();
  chipTypingIdx = -1;
  selectedChipIdx = -1;
  renderChipEditor();
  document.getElementById('chipPicker').className = 'chip-picker';
}

function replaceChip(idx, newVal) {
  editChips[idx] = newVal;
  // 주재료(idx=1) 변경 시 이름·서브재료도 자동 업데이트
  if (editTarget?.type === 'menu' && idx === 1) {
    const mtype = editTarget.menuType;
    const base = mtype === 'hanwoo' ? '한우' : mtype === 'chicken' ? '닭가슴살' : '';
    if (base) document.getElementById('editName').value = `${base} ${newVal}`;
    const pgroup = mtype === 'hanwoo' ? PAIRINGS.hanwoo : mtype === 'chicken' ? PAIRINGS.chicken : PAIRINGS.protein3;
    const subs = pgroup[newVal];
    if (subs && editChips.length > 2) {
      editChips[2] = subs[Math.floor(Math.random() * subs.length)];
    }
  }
  // 선택 상태 유지, 칩만 렌더 후 picker 내용 갱신 (화면 덜 튀게)
  selectedChipIdx = idx;
  chipTypingIdx = -1;
  renderChipEditor();
  showChipPicker(idx);
}

function showChipPicker(idx) {
  const picker = document.getElementById('chipPicker');
  const mtype = editTarget?.menuType;
  const etype = editTarget?.type;
  const current = editChips[idx];
  let options = [];

  if (etype === 'menu') {
    if (idx === 1) {
      options = mtype === 'hanwoo' ? HANWOO_MAIN_POOL : mtype === 'chicken' ? CHICKEN_MAIN_POOL : P3_POOL;
    } else {
      const pg = mtype === 'hanwoo' ? PAIRINGS.hanwoo : mtype === 'chicken' ? PAIRINGS.chicken : PAIRINGS.protein3;
      const all = new Set(['양파','당근','감자','쥬키니호박','브로콜리','두부','한우육수','닭육수','채소상탕']);
      Object.values(pg).forEach(subs => subs.forEach(s => all.add(s)));
      options = [...all];
    }
  } else if (etype === 'yusik') {
    const all = new Set();
    YUSIK_MAIN.forEach(m => m.ingredients.split(',').forEach(i => all.add(i.trim())));
    options = [...all];
  } else if (etype === 'soup') {
    const all = new Set();
    YUSIK_SOUP.forEach(s => s.ingredients.split(',').forEach(i => all.add(i.trim())));
    options = [...all];
  }

  options = options.filter(o => o && o !== current);
  if (!options.length) { picker.className = 'chip-picker'; return; }

  const cc = mtype === 'hanwoo' ? 'hanwoo-chip' : mtype === 'chicken' ? 'chicken-chip' : 'other-chip';
  picker.innerHTML = `<span class="chip-picker-label">"${current}" 대체 선택:</span>` +
    options.map(o => `<span class="suggestion-chip ${cc}" onclick="replaceChip(${idx},'${o.replace(/'/g,"\\'")}')">${o}</span>`).join('');
  picker.className = 'chip-picker active';
}

let addingMode = false;

function addChip() {
  if (addingMode) { // 다시 누르면 취소
    addingMode = false;
    renderChipEditor();
    document.getElementById('chipPicker').className = 'chip-picker';
    return;
  }
  addingMode = true;
  selectedChipIdx = -1;
  chipTypingIdx = -1;
  renderChipEditor();
  showAddPicker();
}

function showAddPicker() {
  const picker = document.getElementById('chipPicker');
  const mtype = editTarget?.menuType;
  const etype = editTarget?.type;
  const used = new Set(editChips);

  let options = [];
  if (etype === 'yusik' || etype === 'soup') {
    const all = new Set();
    YUSIK_MAIN.forEach(m => m.ingredients.split(',').forEach(i => all.add(i.trim())));
    YUSIK_SOUP.forEach(s => s.ingredients.split(',').forEach(i => all.add(i.trim())));
    options = [...all].filter(o => o && !used.has(o));
  } else {
    const pg = mtype === 'hanwoo' ? PAIRINGS.hanwoo : mtype === 'chicken' ? PAIRINGS.chicken : PAIRINGS.protein3;
    const all = new Set(['양파','당근','감자','쥬키니호박','브로콜리','두부','한우육수','닭육수','채소상탕']);
    Object.values(pg).forEach(subs => subs.forEach(s => all.add(s)));
    options = [...all].filter(o => !used.has(o));
  }

  const cc = mtype === 'hanwoo' ? 'hanwoo-chip' : mtype === 'chicken' ? 'chicken-chip' : 'other-chip';
  picker.innerHTML = `<span class="chip-picker-label">추가할 재료 선택:</span>` +
    options.map(o => `<span class="suggestion-chip ${cc}" onclick="addFromPicker('${o.replace(/'/g,"\\'")}')">${o}</span>`).join('');
  picker.className = 'chip-picker active';
}

function addFromPicker(val) {
  editChips.push(val);
  addingMode = false;
  selectedChipIdx = -1;
  renderChipEditor();
  document.getElementById('chipPicker').className = 'chip-picker';
}

function removeChip(idx) {
  editChips.splice(idx, 1);
  if (selectedChipIdx === idx) selectedChipIdx = -1;
  else if (selectedChipIdx > idx) selectedChipIdx--;
  if (chipTypingIdx === idx) chipTypingIdx = -1;
  else if (chipTypingIdx > idx) chipTypingIdx--;
  renderChipEditor();
  document.getElementById('chipPicker').className = 'chip-picker';
}

function syncChipsToTextarea() {
  document.getElementById('editIngredients').value = editChips.join(', ');
}

function applyYusikSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  initChipEditor(ingredients);
}
function applySoupSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  initChipEditor(ingredients);
}

function saveEdit() {
  const name = document.getElementById('editName').value.trim();
  const ingredients = document.getElementById('editIngredients').value.trim();
  const origin = document.getElementById('editOrigin').value.trim();
  if (!name) { showToast('⚠️ 메뉴 이름을 입력해주세요'); return; }

  if (editTarget.type === 'menu') {
    const { di, mi } = editTarget;
    const menu = currentMenu[di].menus[mi];
    menu.displayName = name;
    menu.name = name.includes('죽') ? name : name + ' 죽/무른밥/진밥';
    menu.midNote = document.getElementById('editMidNote').value.trim() || '';
    if (ingredients) {
      menu.ingredients = ingredients;
      // 수정된 재료에서 mainVeggie/subVeggie 갱신 → 저장 시 정확한 콤보 기록
      const parts = ingredients.split(',').map(s => s.trim());
      if (menu.type === 'hanwoo' || menu.type === 'chicken') {
        menu.mainVeggie = parts[1] || menu.mainVeggie;
        menu.subVeggie  = parts[2] || menu.subVeggie;
      } else {
        menu.mainProtein = parts[0] || menu.mainProtein;
        menu.subVeggie   = parts[1] || menu.subVeggie;
      }
    }
  } else if (editTarget.type === 'yusik') {
    const { di, ii } = editTarget;
    currentMenu[di].items[ii].name = name;
    if (ingredients) currentMenu[di].items[ii].ingredients = ingredients;
    currentMenu[di].items[ii].origin = origin;
  } else if (editTarget.type === 'soup') {
    const { di } = editTarget;
    currentMenu[di].soup.name = name;
    if (ingredients) currentMenu[di].soup.ingredients = ingredients;
    currentMenu[di].soup.origin = origin;
  }

  // 항상 해당 카드만 갱신 (renderMenu 대신 refreshHistEditCard)
  const _di = window._histEditDi != null ? window._histEditDi : (editTarget.di != null ? editTarget.di : null);
  if (_di != null) {
    refreshHistEditCard(_di);
  } else {
    renderMenu();
  }
  closeModal('editModal');
  showToast('✅ 메뉴가 수정됐어요');
}

  currentMenu[di].items.splice(ii, 1);

function removeDay(di) {
  currentMenu[di].removed = true;
  renderMenu();
  showToast('🗑️ 공휴일 처리됨 — 메뉴 생성 버튼으로 복원 가능');
}

async function regenDay(di) {
  const day = currentMenu[di];
  const prevWeek = await getPrevWeekVeggies();
  const usedThisWeek = { hanwoo: [], chicken: [], p3: [] };
  currentMenu.forEach((d, i) => {
    if (i !== di && d.type === 'yushik') {
      d.menus.forEach(m => {
        if (m.type === 'hanwoo') usedThisWeek.hanwoo.push(m.mainVeggie);
        else if (m.type === 'chicken') usedThisWeek.chicken.push(m.mainVeggie);
        else if (m.mainProtein) usedThisWeek.p3.push(m.mainProtein);
      });
    }
  });

  currentMenu[di].removed = false;
  if (day.type === 'yushik') {
    currentMenu[di].menus = buildYushikMenu(di, usedThisWeek, prevWeek);
  } else {
    const usedYusikNames = await getUsedYusikNames();
    const available = YUSIK_MAIN.filter(m => !usedYusikNames.has(m.name));
    const pool = available.length >= 5 ? available : YUSIK_MAIN;
    const shuffled = shuffle(pool);
    currentMenu[di].items = shuffled.slice(0, 5);
    currentMenu[di].soup = shuffle(YUSIK_SOUP)[0];
  }
  refreshHistEditCard(di);
  showToast('✅ 메뉴가 생성되었어요');
}

async function saveMenu() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }
  const weekKey = document.getElementById('weekStart').value;

  }

  await recordThisWeek(weekKey, currentMenu);

    `✅ ${weekKey} 저장 완료`;

}

// 해당 주차가 이미 서버에 저장됐는지 확인
async function isWeekSaved(weekKey) {
  if (!weekKey) return false;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/kkakung_history?id=eq.${weekKey}&select=yusik`, {
      headers: SB_HEADERS
    });
    if (!res.ok) return false;
    const rows = await res.json();
    return rows.length > 0 && !!(rows[0].yusik && rows[0].yusik.schedule);
  } catch(e) { return false; }
}

// ===== 중복 확인 =====
let _conflictMode = false;
let _dupSet = new Set();

function highlightIngreds(str) {
  if (!_conflictMode || _dupSet.size === 0) return str;
  return str.split(',').map(part => {
    const t = part.trim();
    if (_dupSet.has(t)) return ` <mark style="background:#FFE066;border-radius:3px;padding:0 3px;font-weight:700">${t}</mark>`;
    return part;
  }).join(',');
}

function checkConflicts() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }

  if (_conflictMode) {
    _conflictMode = false;
    _dupSet.clear();
    renderMenu();
    document.getElementById('conflictBtn').classList.remove('active');
    return;
  }

  const all = [];
  currentMenu.forEach(day => {
    if (day.type === 'yushik') {
      day.menus.forEach(m => {
        m.ingredients.split(',').forEach(i => { const t = i.trim(); if (t) all.push(t); });
      });
    }
  });

  const exempt = new Set(['양파','채소상탕','한우육수','닭육수','당근','채소육수','한우','닭가슴살','닭','양파','소금','채소육수','']);
  const counts = {};
  all.forEach(i => { if (!exempt.has(i)) counts[i] = (counts[i]||0)+1; });
  const dups = Object.entries(counts).filter(([k,v]) => v > 1);

  if (dups.length === 0) { showToast('✅ 이번 주 재료 중복 없음!'); return; }

  _dupSet = new Set(dups.map(d => d[0]));
  _conflictMode = true;
  renderMenu();
  document.getElementById('conflictBtn').classList.add('active');
  showToast(`⚠️ 중복 재료 ${dups.length}개 강조 표시됨`);
}

function fmtWeekLabel(weekKey) {
  const m = weekKey.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return weekKey;
  // 년도 제거, 월/일만 표시
  return `${parseInt(m[2])}/${parseInt(m[3])} 주`;
}

let _historyData = null;

async function showHistory(forceOpen) {
  const panel = document.getElementById('historyPanel');
  panel.style.display = 'block';

  const sel = document.getElementById('historyWeekSelect');
  const btnsBox = document.getElementById('historyQuickButtons');
  btnsBox.innerHTML = '<span style="font-size:12px;color:var(--text-light)">불러오는 중...</span>';
  sel.innerHTML = '<option value="">그 외 주차 선택...</option>';
  sel.disabled = true;
  document.getElementById('historyContent').innerHTML = '';

  const h = await loadHistory();
  _historyData = h;

  if (h._loadFailed) {
    btnsBox.innerHTML = '<span style="font-size:12px;color:#c44">서버 연결 실패</span>';
    document.getElementById('historyContent').innerHTML = '<p style="color:#c44">⚠️ 서버 연결 실패. 잠시 후 다시 시도해주세요.</p>';
    return;
  }

  if (!h.yusik.length) {
    btnsBox.innerHTML = '<span style="font-size:12px;color:var(--text-light)">기록 없음</span>';
    document.getElementById('historyContent').innerHTML = '<p style="color:var(--text-light)">아직 저장된 기록이 없어요. 메뉴 생성 후 저장해주세요.</p>';
    return;
  }

  // 최신 주차가 위에 오도록 정렬
  const sorted = [...h.yusik].sort((a, b) => b.weekKey.localeCompare(a.weekKey));
  // 최근 3주: 즉시 클릭 버튼
  const quick = sorted.slice(0, 3);
  // 그 외: select 드롭다운
  const rest = sorted.slice(3);

  // 전주 → 이번 주 순서 (오래된 것이 왼쪽)
  btnsBox.innerHTML = [...quick].reverse().map((w, i, arr) => {
    const isThis = i === arr.length - 1; // 마지막이 이번 주
    const label = isThis ? '이번 주' : fmtWeekLabel(w.weekKey);
    const bg = isThis ? 'rgba(139,170,124,0.18)' : '#fff';
    const border = isThis ? 'rgba(139,170,124,0.55)' : 'var(--border)';
    return `<button onclick="quickSelectWeek('${w.weekKey}')" data-week="${w.weekKey}" class="hist-quick-btn" style="padding:8px 14px;border:1px solid ${border};background:${bg};border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text)">${label}</button>`;
  }).join('');

  // sel은 hidden — 표시/숨김 제어 불필요
  // 버튼 로드 후 현재 메뉴 단독 뷰 표시
  renderCurrentInHistory();
}

function quickSelectWeek(wk) {
  document.getElementById('historyWeekSelect').value = '';
  // 가짜 select에 임시로 값 넣어 renderSelectedWeek 재사용
  const sel = document.getElementById('historyWeekSelect');
  // option이 없으면 임시 추가
  if (!Array.from(sel.options).some(o => o.value === wk)) {
    const opt = document.createElement('option');
    opt.value = wk; opt.style.display = 'none';
    sel.appendChild(opt);
  }
  sel.value = wk;
  // 활성 버튼 표시
  document.querySelectorAll('.hist-quick-btn').forEach(b => {
    if (b.dataset.week === wk) {
      b.style.background = 'rgba(139,170,124,0.32)';
      b.style.borderColor = 'rgba(139,170,124,0.7)';
    } else {
      b.style.background = '#fff';
      b.style.borderColor = 'var(--border)';
    }
  });
  renderSelectedWeek();
}

const DOW_NAMES = ['일','월','화','수','목','금','토'];
function fmtDayLabel(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  const m = d.getMonth() + 1, day = d.getDate(), dow = DOW_NAMES[d.getDay()];
  return `${m}/${day} (${dow})`;
}
function typeLabel(t) { return t === 'hanwoo' ? '한우' : t === 'chicken' ? '닭' : '기타'; }
function typeBg(t)    { return t === 'hanwoo' ? '#ffe8d8' : t === 'chicken' ? '#fff5d8' : '#e8f4d8'; }
function typeColor(t) { return t === 'hanwoo' ? '#a04830' : t === 'chicken' ? '#8a7020' : '#3a7030'; }

// 일별 카드 렌더 (비교 뷰용)
function highlightDupes(ingStr, dupeSet) {
  if (!dupeSet || !dupeSet.size) return ingStr;
  return ingStr.split(',').map(part => {
    const t = part.trim();
    return dupeSet.has(t)
      ? ` <span style="color:#b84a1a;font-weight:800;text-decoration:underline">${t}</span>`
      : part;
  }).join(',');
}

function renderDayCard(day, accentBg, dupeSet, dupeColorMap) {
  if (!day) return `<div style="padding:14px;background:#fafafa;border:1px dashed var(--border);border-radius:8px;color:var(--text-light);font-size:11px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center">— 없음 —</div>`;
  const dateStr = (day.date instanceof Date) ? day.date.toISOString().slice(0,10) : day.date;
  const dayLabel = fmtDayLabel(dateStr);
  let h = `<div style="background:${accentBg||'white'};border:1px solid var(--border);border-radius:8px;padding:10px;">`;
  h += `<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)">${dayLabel}</div>`;
  if (day.type === 'yusik' && day.items) {
    h += `<div style="font-size:9px;color:var(--text-light);font-weight:700;margin-bottom:3px">🍲 유아식</div>`;
    day.items.forEach((it, i) => {
      h += `<div style="margin-bottom:5px;padding:5px 7px;background:#fafafa;border-radius:5px">`;
      h += `<div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px">${i+1}. ${it.name}</div>`;
      if (it.ingredients) h += `<div style="font-size:10px;color:var(--text-light);line-height:1.4">${it.ingredients}</div>`;
      h += '</div>';
    });
    // 국 표시 (read-only)
    if (day.soup?.name) {
      h += `<div style="margin-top:4px;padding:4px 7px;background:#fafafa;border-radius:5px;font-size:10px">`;
      h += `<span style="color:var(--text-light);font-weight:600">국 </span><span style="color:var(--text);font-weight:600">${day.soup.name}</span>`;
      if (day.soup.ingredients) h += `<div style="font-size:10px;color:var(--text-light)">${day.soup.ingredients}</div>`;
      h += '</div>';
    }
  } else if (day.type === 'yushik' && day.menus) {
    h += `<div style="font-size:9px;color:var(--text-light);font-weight:700;margin-bottom:3px">🥄 이유식</div>`;
    day.menus.forEach(m => {
      h += `<div style="margin-bottom:5px;padding:5px 7px;background:#fafafa;border-radius:5px">`;
      const ing = normalizeYushikIngredients(m.ingredients||'', m.type);
      if (ing) h += `<div style="font-size:11px;font-weight:700;color:var(--text);line-height:1.4">${highlightDupes(ing, dupeSet, dupeColorMap)}</div>`;
      if (m.midNote) h += `<div style="font-size:10px;color:#b84a1a;margin-top:2px;font-weight:600">⚠️ 중기: ${m.midNote}</div>`;
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

// 이번 주(오른쪽) 편집 가능 카드 — currentMenu[di] 기반
function renderEditableDayCard(day, di, accentBg, dupeSet, dupeColorMap) {
  if (!day) return `<div style="padding:14px;background:#fafafa;border:1px dashed var(--border);border-radius:8px;color:var(--text-light);font-size:11px;text-align:center;min-height:60px;display:flex;align-items:center;justify-content:center">— 없음 —</div>`;

  let h = `<div id="histEditCard-${di}" style="background:${accentBg||'white'};border:${border};border-radius:8px;padding:10px;">`;

  // 헤더: 날짜 + 공휴일/재생성 버튼
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border)">`;

    h += `<button onclick="regenDay(${di})" style="background:var(--primary-light);border:1px solid #f5c5aa;color:var(--primary);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer">+ 메뉴 생성</button>`;
  } else if (day.type === 'yushik') {
    h += `<button onclick="removeDayAndRefresh(${di})" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--text-light)">공휴일</button>`;
  } else if (day.type === 'yusik') {
    h += `<button onclick="removeDayAndRefresh(${di})" style="background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;color:var(--text-light)">공휴일</button>`;
  }
  h += '</div>';

  if (day.removed) {
    h += `<div style="text-align:center;padding:10px 0">
      <div style="font-size:11px;color:var(--text-light);margin-bottom:8px">공휴일</div>
      <button onclick="regenDay(${di})" style="background:var(--primary);border:none;color:white;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">+ 메뉴 생성</button>
    </div>`;
  } else if (day.type === 'yusik' && day.items) {
    h += `<div style="font-size:9px;color:var(--text-light);font-weight:700;margin-bottom:4px">🍲 유아식</div>`;
    day.items.forEach((it, ii) => {
      h += `<div style="margin-bottom:5px;padding:5px 7px;background:#fafafa;border-radius:5px;display:flex;align-items:flex-start;gap:6px">`;
      h += `<div style="flex:1"><div style="font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px">${ii+1}. ${it.name}</div>`;
      if (it.ingredients) h += `<div style="font-size:10px;color:var(--text-light);line-height:1.4">${it.ingredients}</div>`;
      h += `</div>`;
      h += `<div style="display:flex;gap:3px;flex-shrink:0">`;
      h += `<button onclick="openEditYusikAndRefresh(${di},${ii})" style="background:none;border:none;font-size:12px;cursor:pointer;padding:0;opacity:0.7">✏️</button>`;
      h += `<button onclick="deleteYusikAndRefresh(${di},${ii})" style="background:none;border:none;font-size:12px;cursor:pointer;padding:0;opacity:0.5;color:#c44">✕</button>`;
      h += `</div></div>`;
    });
    if (day.items.length < 7) h += `<button onclick="addYusikAndRefresh(${di})" style="width:100%;padding:5px;background:none;border:1px dashed var(--border);border-radius:6px;font-size:11px;cursor:pointer;color:var(--text-light);margin-top:3px">+ 반찬 추가</button>`;
    {
      const soupName = day.soup?.name || '';
      const soupIng  = day.soup?.ingredients || '';
      h += `<div style="margin-top:6px;padding:5px 7px;background:#fafafa;border-radius:5px;display:flex;align-items:flex-start;gap:6px">`;
      h += `<div style="flex:1"><div style="font-size:10px;font-weight:600;color:var(--text-light);margin-bottom:1px">국</div>`;
      if (soupName) {
        h += `<div style="font-size:11px;font-weight:600;color:var(--text)">${soupName}</div>`;
        if (soupIng) h += `<div style="font-size:10px;color:var(--text-light)">${soupIng}</div>`;
      } else {
        h += `<div style="font-size:11px;color:var(--text-light);font-style:italic">이름 없음 — ✏️ 눌러서 입력</div>`;
      }
      h += `</div><button onclick="openEditSoupAndRefresh(${di})" style="background:none;border:none;font-size:12px;cursor:pointer;padding:0;opacity:0.7">✏️</button>`;
      h += '</div>';
    }
  } else if (day.type === 'yushik' && day.menus) {
    h += `<div style="font-size:9px;color:var(--text-light);font-weight:700;margin-bottom:4px">🥄 이유식</div>`;
    day.menus.forEach((m, mi) => {
      const ing = normalizeYushikIngredients(m.ingredients||'', m.type);
      h += `<div style="margin-bottom:5px;padding:5px 7px;background:#fafafa;border-radius:5px;display:flex;align-items:flex-start;gap:6px">`;
      h += `<div style="flex:1">`;
      if (ing) h += `<div style="font-size:11px;font-weight:700;color:var(--text);line-height:1.4">${highlightDupes(ing, dupeSet, dupeColorMap)}</div>`;
      if (m.midNote) h += `<div style="font-size:10px;color:#b84a1a;margin-top:2px;font-weight:600">⚠️ 중기: ${m.midNote}</div>`;
      h += `</div><button onclick="openEditAndRefresh(${di},${mi})" style="background:none;border:none;font-size:12px;cursor:pointer;padding:0;flex-shrink:0;opacity:0.7">✏️</button>`;
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

// 히스토리 카드용 helper wrappers
function removeDayAndRefresh(di) { currentMenu[di].removed = true; refreshHistEditCard(di); showToast('공휴일 처리됨'); }
function deleteYusikAndRefresh(di, ii) {
  if (currentMenu[di].items.length <= 3) { showToast('⚠️ 최소 3개'); return; }
  currentMenu[di].items.splice(ii, 1); refreshHistEditCard(di);
}
function addYusikAndRefresh(di) {
  currentMenu[di].items.push({ name: '새 반찬', ingredients: '' });
  refreshHistEditCard(di);
  // 마지막 항목 편집 바로 열기
  setTimeout(() => openEditYusikAndRefresh(di, currentMenu[di].items.length - 1), 100);
}
function openEditSoupAndRefresh(di) {
  window._histEditDi = di; window._histEditType = 'soup';
  openEditSoup(di);
}

// 편집 후 히스토리 오른쪽 카드만 갱신
function openEditAndRefresh(di, mi) {
  window._histEditDi = di; window._histEditMi = mi; window._histEditType = 'menu';
  openEdit(di, mi);
}
function openEditYusikAndRefresh(di, ii) {
  window._histEditDi = di; window._histEditType = 'yusik'; window._histEditIi = ii;
  openEditYusik(di, ii);
}
function refreshHistEditCard(di) {
  if (!currentMenu || !currentMenu[di]) return;
  const el = document.getElementById(`histEditCard-${di}`);
  if (el) {
    const parent = el.parentElement;
    const dupeSet = window._histLastDupeSet || new Set();
    const dupeColorMap = window._histDupeColorMap || {};
    const bg = window._histCompareActive ? 'rgba(139,170,124,0.06)' : 'rgba(139,170,124,0.06)';
    const newCard = renderEditableDayCard(currentMenu[di], di, bg, dupeSet, dupeColorMap);
    const tmp = document.createElement('div');
    tmp.innerHTML = newCard;
    parent.replaceChild(tmp.firstChild, el);
  } else {
    // 카드가 없으면 전체 재렌더 (단독 모드)
    renderCurrentInHistory();
  }
}

function renderSelectedWeek() {
  if (!_historyData) { document.getElementById('historyContent').innerHTML = '<p style="color:#c44">먼저 히스토리를 불러와주세요.</p>'; return; }
  const wk = document.getElementById('historyWeekSelect').value;
  if (!wk) return;
  const w = _historyData.yusik.find(x => x.weekKey === wk);
  const veg = _historyData.yushik_veggie.find(x => x.weekKey === wk) || {hanwoo:[],chicken:[],p3:[]};
  if (!w) { document.getElementById('historyContent').innerHTML = '<p style="color:#c44">데이터를 찾을 수 없어요.</p>'; return; }

  // 좌우 비교: 왼쪽 = 직전 주(전주), 오른쪽 = 선택한 주(이번/최근)
  const thisSchedule = (w.schedule && Array.isArray(w.schedule)) ? w.schedule : null;
  const allSorted = [..._historyData.yusik].sort((a, b) => a.weekKey.localeCompare(b.weekKey));
  const selectedIdx = allSorted.findIndex(x => x.weekKey === wk);
  const prevInDb = selectedIdx > 0 ? allSorted[selectedIdx - 1] : null;
  const prevSchedule = prevInDb?.schedule && Array.isArray(prevInDb.schedule) ? prevInDb.schedule : null;

  const hasComparison = thisSchedule && thisSchedule.length && prevSchedule && prevSchedule.length;

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">`;
  html += `<strong style="font-size:14px">📖 ${fmtWeekLabel(wk)}</strong>`;
  html += `<button class="btn btn-ghost" onclick="exitHistoryView()" style="padding:5px 12px;font-size:11px">✕ 닫기</button>`;
  html += `</div>`;

  if (hasComparison) {
    html += `<button class="btn btn-ghost" onclick="checkHistoryDupes()" style="width:100%;margin-bottom:10px;font-size:12px;background:rgba(122,36,24,0.08);border:1px solid rgba(122,36,24,0.35);color:var(--primary);font-weight:600">🔍 전주 vs 이번 주 재료 중복 확인</button>`;
    html += `<div id="histDupeResult" style="margin-bottom:10px"></div>`;
    const maxLen = Math.max(prevSchedule.length, thisSchedule.length);
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">`;
    html += `<div style="text-align:center;font-size:11px;font-weight:700;padding:6px;background:#f0eae0;border-radius:5px;color:var(--text)">전주 ${fmtWeekLabel(prevInDb.weekKey)}</div>`;
    html += `<div style="text-align:center;font-size:11px;font-weight:700;padding:6px;background:rgba(139,170,124,0.18);border-radius:5px;color:var(--text)">이번 주 ${fmtWeekLabel(wk)}</div>`;
    html += `</div>`;
    html += `<div id="histCompareGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    for (let i = 0; i < maxLen; i++) {
      html += renderDayCard(prevSchedule[i], '#fdfaf3');
      // 오른쪽: currentMenu 있으면 편집 가능 카드, 없으면 저장된 schedule
      const curDay = currentMenu && currentMenu[i];
      html += curDay
        ? renderEditableDayCard(curDay, i, 'rgba(139,170,124,0.06)')
        : renderDayCard(thisSchedule[i], 'rgba(139,170,124,0.06)');
    }
    html += `</div>`;
    document.getElementById('historyContent').innerHTML = html;
    window._histCompare = { prevSchedule, thisSchedule };
    window._histCompareActive = true;
    // menuContainer 숨김 (이번주 메뉴는 오른쪽에서 직접 편집)
    document.getElementById('menuContainer').style.display = 'none';
    return;
  }

  // schedule 있으면 단일 (이번 주 메뉴 없음 시)
  if (w.schedule && Array.isArray(w.schedule) && w.schedule.length) {
    // schedule 있으면 요일별 카드로 정확히 표시
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;">';
    w.schedule.forEach(day => {
      const dayLabel = fmtDayLabel(day.date);
      html += `<div style="background:white;border:1px solid var(--border);border-radius:10px;padding:12px;">`;
      html += `<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);">${dayLabel}</div>`;
      if (day.type === 'yusik' && day.items) {
        html += `<div style="font-size:10px;color:var(--text-light);font-weight:700;margin-bottom:4px">🍲 유아식</div>`;
        day.items.forEach((it, i) => {
          html += `<div style="margin-bottom:8px;padding:6px 8px;background:#fafafa;border-radius:6px">`;
          html += `<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px">${i+1}. ${it.name}</div>`;
          html += `<div style="font-size:10px;color:var(--text-light);line-height:1.5">${it.ingredients||''}</div>`;
          html += '</div>';
        });
      } else if (day.type === 'yushik' && day.menus) {
        html += `<div style="font-size:10px;color:var(--text-light);font-weight:700;margin-bottom:4px">🥄 이유식</div>`;
        day.menus.forEach((m, i) => {
          html += `<div style="margin-bottom:8px;padding:6px 8px;background:#fafafa;border-radius:6px">`;
          const _ing = normalizeYushikIngredients(m.ingredients||'', m.type);
          if (_ing) html += `<div style="font-size:12px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:2px">${_ing}</div>`;
          if (m.midNote) html += `<div style="font-size:10px;color:#b84a1a;font-weight:600">⚠️ 중기: ${m.midNote}</div>`;
          html += '</div>';
        });
      }
      html += '</div>';
    });
    html += '</div>';
  } else {
    // schedule 없는 옛 형식 — 저장된 데이터 그대로 복원 (요일 정보 없음)
    if (w.menus && w.menus.length) {
      html += `<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text)">🍲 유아식 반찬 <span style="color:var(--text-light);font-weight:400">(${w.menus.length}개)</span></div>`;
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:14px">';
      w.menus.forEach(m => {
        html += `<div style="padding:10px 12px;background:white;border:1px solid var(--border);border-radius:8px">`;
        html += `<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">${m.name}</div>`;
        if (m.ingredients) html += `<div style="font-size:11px;color:var(--text-light);line-height:1.5">${m.ingredients}</div>`;
        html += '</div>';
      });
      html += '</div>';
    }

    // 이유식 — 저장된 콤보 그대로 + 표준 ingredients 재구성
    const buildYushikMenu = (combo, type) => {
      const [main, sub] = (combo || '').split('|');
      // 단백질 + 콤보 재료만 넣음. 고정 재료(육수·양파·채소상탕·당근) 인위 추가 안 함.
      const parts = type === 'hanwoo'  ? ['한우', main, sub]
                  : type === 'chicken' ? ['닭가슴살', main, sub]
                  :                      [main, sub];
      const raw = parts.filter(Boolean).join(', ');
      const name = type === 'hanwoo'  ? `한우 ${main||''}`.trim()
                 : type === 'chicken' ? `닭가슴살 ${main||''}`.trim()
                 :                      `${main||''}${sub?' '+sub:''}`.trim();
      return { name, ingredients: normalizeYushikIngredients(raw, type), type };
    };
    // 동일 이름 중복 제거
    const seen = new Set();
    const yushikMenus = [];
    const addMenu = (m) => { if (!seen.has(m.name)) { seen.add(m.name); yushikMenus.push(m); } };
    (veg.hanwoo || []).forEach(c => addMenu(buildYushikMenu(c, 'hanwoo')));
    (veg.chicken || []).forEach(c => addMenu(buildYushikMenu(c, 'chicken')));
    (veg.p3 || []).forEach(c => addMenu(buildYushikMenu(c, 'other')));

    if (yushikMenus.length) {
      html += `<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--text)">🥄 이유식 메뉴 <span style="color:var(--text-light);font-weight:400">(${yushikMenus.length}개)</span></div>`;
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">';
      yushikMenus.forEach(m => {
        html += `<div style="padding:10px 12px;background:white;border:1px solid var(--border);border-radius:8px">`;
        html += `<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">${m.name}</div>`;
        html += `<div style="font-size:11px;color:var(--text-light);line-height:1.5">${m.ingredients}</div>`;
        html += '</div>';
      });
      html += '</div>';
    }
  }

  document.getElementById('historyContent').innerHTML = html;
}

// 겹치는 재료별 색상 팔레트
// 중복 재료 색상 — 밝은 배경에 진한 텍스트 (흰 배경에서도 잘 보이게)
const DUPE_COLORS = [
  {text:'#c82010'},  // 빨강
  {text:'#0070cc'},  // 파랑
  {text:'#107a10'},  // 초록
  {text:'#7a0090'},  // 보라
  {text:'#cc7000'},  // 주황
  {text:'#007a7a'},  // 청록
  {text:'#cc0060'},  // 핑크
  {text:'#705000'},  // 갈색
];

function highlightDupes(ingStr, dupeSet, dupeColorMap) {
  if (!dupeSet || !dupeSet.size) return ingStr;
  return ingStr.split(',').map(part => {
    const t = part.trim();
    if (!dupeSet.has(t)) return part;
    const c = dupeColorMap ? dupeColorMap[t] : null;
    const color = c ? c.text : '#b84a1a';
    return ` <span style="color:${color};font-weight:800">${t}</span>`;
  }).join(',');
}

function checkHistoryDupes() {
  // 이번 주 메뉴 없으면 중단
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }

  const data = window._histCompare;
  const EXCLUDE = new Set(['한우','닭가슴살','닭고기','한우육수','닭육수','양파','채소상탕','당근','소금','물']);

  function extractYushikIngreds(schedule) {
    const set = new Set();
    (schedule || []).forEach(day => {
      if (day.type !== 'yushik') return;
      (day.menus || []).forEach(m => {
        normalizeYushikIngredients(m.ingredients||'', m.type)
          .split(',').map(s=>s.trim()).filter(Boolean)
          .forEach(x => { if (!EXCLUDE.has(x)) set.add(x); });
      });
    });
    return set;
  }

  // ① 이번 주 내 중복 (같은 재료 2일 이상 등장)
  const weekIngCounts = {};
  (currentMenu || []).forEach(day => {
    if (day.type !== 'yushik') return;
    (day.menus || []).forEach(m => {
      normalizeYushikIngredients(m.ingredients||'', m.type)
        .split(',').map(s=>s.trim()).filter(Boolean)
        .forEach(x => { if (!EXCLUDE.has(x)) weekIngCounts[x] = (weekIngCounts[x]||0)+1; });
    });
  });
  const intraWeekDupes = new Set(Object.entries(weekIngCounts).filter(([,v])=>v>1).map(([k])=>k));

  // ② 전주 vs 이번 주 (비교 모드일 때만)
  let crossWeekDupes = new Set();
  if (data) {
    const prev = extractYushikIngreds(data.prevSchedule);
    const cur  = extractYushikIngreds(currentMenu);
    crossWeekDupes = new Set([...prev].filter(x => cur.has(x)));
  }

  // 합산 dupeSet
  const allDupes = new Set([...intraWeekDupes, ...crossWeekDupes]);
  const dupeColorMap = {};
  [...allDupes].forEach((d, i) => { dupeColorMap[d] = DUPE_COLORS[i % DUPE_COLORS.length]; });
  window._histLastDupeSet = allDupes;
  window._histDupeColorMap = dupeColorMap;

  // 상단 요약
  const el = document.getElementById('histDupeResult');
  if (el) {
    if (!allDupes.size) {
      el.innerHTML = `<div style="padding:8px 12px;background:rgba(139,170,124,0.12);border:1px solid rgba(139,170,124,0.4);border-radius:8px;font-size:12px;color:#3a7030;font-weight:600">✅ 중복 재료 없음</div>`;
    } else {
      const parts = [];
      if (intraWeekDupes.size) parts.push(`이번 주 내 ${intraWeekDupes.size}개`);
      if (crossWeekDupes.size) parts.push(`전주 겹침 ${crossWeekDupes.size}개`);
      const chipList = [...allDupes].map(d => `<span style="color:${dupeColorMap[d].text};font-weight:800">${d}</span>`).join(', ');
      el.innerHTML = `<div style="padding:8px 12px;background:rgba(255,214,204,0.2);border:1px solid rgba(255,140,105,0.4);border-radius:8px;font-size:11px;color:#7a2010;font-weight:600">⚠️ ${parts.join(' / ')}: ${chipList}</div>`;
    }
  }

  // 카드 재렌더링
  if (data && document.getElementById('histCompareGrid')) {
    const grid = document.getElementById('histCompareGrid');
    const rightSchedule = currentMenu;
    const maxLen = Math.max(data.prevSchedule.length, rightSchedule.length);
    let html = '';
    for (let i = 0; i < maxLen; i++) {
      html += renderDayCard(data.prevSchedule[i], '#fdfaf3', allDupes, dupeColorMap);
      html += renderEditableDayCard(rightSchedule[i], i, 'rgba(139,170,124,0.06)', allDupes, dupeColorMap);
    }
    grid.innerHTML = html;
  } else {
    // 단독 모드: 이번 주 카드 재렌더
    renderCurrentInHistory();
    // historyContent 내 카드들 재렌더 (dupeSet 적용)
    // TODO: 단독 모드에서 dupeSet 적용은 renderCurrentInHistory 확장 필요
  }
}

const IMAGE_API = '/api/menu-image';

async function downloadImages() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }

  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ 생성 중...';
  btn.disabled = true;

  try {
    let downloaded = 0;
    for (const day of currentMenu) {
      let payload;

      if (day.type === 'yushik') {
        // 이유식 - 3개 메뉴에서 이름/재료 추출
        const menus = day.menus.map(m => ({
          name: (m.displayName || m.name).replace(' 죽/무른밥/진밥',''),
          ingred: m.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
            return acc;
          }, [])
        }));

        // 원산지 자동 생성 (재료에서 추출)
        const allIngred = day.menus.flatMap(m =>
          m.ingredients.split(',').map(s => s.trim()).filter(s => s && !['양파','채소상탕','한우육수','닭육수'].includes(s))
        );
        // 직접 입력한 원산지 사용 (없으면 자동생성)
        const origins = day.origins || [...new Set(allIngred)].map(i => i + '국내산').join(', ');

        payload = {
          type: 'yushik',
          date_str: formatKorDate(day.date),
          menus,
          origins
        };
      } else {
        // 유아식 - 각 item의 origin 직접 사용
        const items = day.items.map(item => ({
          name: item.name,
          ingred: item.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
            return acc;
          }, []),
          origin: item.origin || ''
        }));

        const soupIngred = day.soup.ingredients.split(',').map(s => s.trim());

        // 원산지: 각 item.origin 합치기
        const allOrigins = [
          ...day.items.map(i => i.origin).filter(Boolean),
          day.soup.origin || ''
        ].filter(Boolean).join(', ');

        payload = {
          type: 'yusik',
          date_str: formatKorDate(day.date),
          items,
          soup: {
            name: day.soup.name,
            ingred: soupIngred.reduce((acc, _, i, arr) => {
              if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
              return acc;
            }, []),
            origin: day.soup.origin || ''
          },
          origins: allOrigins,
          notes: [
            '아이마다 좋아하는 맛과 속도가 달라 모든 메뉴가 항상 잘 맞지 않을 수 있습니다.',
            '알레르기나 조정이 필요한 재료는 주문 시 편하게 말씀 주세요.',
            '주문은 일요일 저녁 10시까지 부탁드립니다.',
            '까꿍디미방은 재료 궁합을 고려해 식단을 구성하고, 친환경 재료를 사용해 정성스럽게 조리합니다.',
          ]
        };
      }

      const res = await fetch(IMAGE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`API 오류: ${res.status}`);

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const typeLabel = day.type === 'yushik' ? '이유식' : '유아식';
      a.href = url;
      a.download = `까꿍디미방_${typeLabel}_${formatKorDate(day.date)}.png`;
      a.click();
      URL.revokeObjectURL(url);
      downloaded++;

      // 연속 다운로드 간격
      await new Promise(r => setTimeout(r, 500));
    }

    showToast(`✅ ${downloaded}개 이미지 다운로드 완료!`);
  } catch (e) {
    showToast(`❌ 오류: ${e.message}`);
    console.error(e);
  } finally {
    btn.textContent = '🖼️ 이미지 다운로드';
    btn.disabled = false;
  }
}

function printMenuTable() {

  const allDays = currentMenu.filter(d => !d.removed);
  if (!allDays.length) { showToast('⚠️ 메뉴가 없어요'); return; }

  const SFXARR = ['죽','무른밥','진밥'];
  const NUMS   = [['1.','2.','3.'],['4.','5.','6.'],['7.','8.','9.']];
  const RC     = ['#c8e8a8','#f0e880','#f5c870'];
  const STAGES = [
    {t:'오물오물<br>중 &nbsp; 기', s:'( 7 ~ 9 개월 )'},
    {t:'잘근잘근<br>후 &nbsp; 기', s:'( 9 ~ 14 개월 )'},
    {t:'와구와구<br>완 &nbsp;료 &nbsp;기', s:'( 14 개월 ~ )'},
  ];
  const SFXALL = ['한우육수','닭육수','채소상탕','양파'];
  const TYPE_SFX = {hanwoo:['한우육수','양파','채소상탕'],chicken:['닭육수','양파','채소상탕'],p3:['양파','채소상탕'],protein3:['양파','채소상탕']};
  const FORG = {'파로':'이탈리아','아보카도':'페루','아마란스':'페루','퀴노아':'페루','단호박':'뉴질랜드','렌틸콩':'캐나다','오트밀':'캐나다','햄프시드':'캐나다','캐슈넛':'베트남','치아씨드':'멕시코','소고기':'호주','황태':'러시아'};

  function buildTitle(m) {
    const sfxIng = ['양파','채소상탕','한우육수','닭육수'];
    const ings = (m.ingredients||'').split(',').map(s=>s.trim()).filter(Boolean);
    const main = ings.filter(s=>!sfxIng.includes(s));
    if (m.type==='hanwoo') {
      const v = main.find(s=>s!=='한우')||'';
      return v ? '한우 '+v : '한우';
    }
    if (m.type==='chicken') {
      const v = main.find(s=>s!=='닭가슴살')||'';
      return v ? '닭가슴살 '+v : '닭가슴살';
    }
    // 기타단백질: P3_POOL 기준으로 주재료를 먼저 찾고 + 야채 1개
    const p3Set = new Set(P3_POOL);
    const mainProt = main.find(s=>p3Set.has(s)) || main[0] || '';
    const veggie = main.find(s=>s!==mainProt) || '';
    return mainProt + (veggie ? ' '+veggie : '');
  }

  function sortI(ingStr, menuName, mtype) {
    const sfx = TYPE_SFX[mtype] || ['양파','채소상탕'];
    let p = ingStr.split(',').map(s=>s.trim()).filter(Boolean);
    sfx.forEach(s => { if (!p.includes(s)) p.push(s); });
    const body = p.filter(s => !sfx.includes(s));
    const nToks = (menuName||'').replace(/\s*(죽|무른밥|진밥).*$/,'').trim().split(/\s+/);
    const ord = [];
    nToks.forEach(t => { const f=body.find(b=>b===t||b.startsWith(t)||t.startsWith(b)); if(f&&!ord.includes(f)) ord.push(f); });
    body.forEach(b => { if (!ord.includes(b)) ord.push(b); });
    return [...ord, ...sfx];
  }

  function fmtI(ingStr, mtype, menuName) {
    const p = sortI(ingStr, menuName||'', mtype);
    const lines=[]; for(let i=0;i<p.length;i+=2) lines.push(p.slice(i,i+2).join(', '));
    return lines.map(l=>'<div>'+l+'</div>').join('');

      ord.filter(s=>!SFXALL.includes(s)).slice(0,3).forEach(s => {

// ===== PDF 다운로드 (이미지 한 장 = PDF 한 페이지) =====
async function downloadPDF() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }

  const btn = document.getElementById('pdfBtn');
  btn.textContent = '⏳ PDF 생성 중...';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = 210, pageH = 297;
    let isFirst = true;

    for (const day of currentMenu) {
      let payload;
      if (day.type === 'yushik') {
        const menus = day.menus.map(m => ({
          name: (m.displayName || m.name).replace(' 죽/무른밥/진밥',''),
          ingred: m.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', ')); return acc;
          }, [])
        }));
        const allIngred = day.menus.flatMap(m =>
          m.ingredients.split(',').map(s => s.trim()).filter(s => s && !['양파','채소상탕','한우육수','닭육수'].includes(s))
        );
        const pdfOrigins = day.origins || [...new Set(allIngred)].map(i => i+'국내산').join(', ');
        payload = { type: 'yushik', date_str: formatKorDate(day.date), menus, origins: pdfOrigins };
      } else {
        const items = day.items.map(item => ({
          name: item.name,
          ingred: item.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', ')); return acc;
          }, []),
          origin: item.origin || ''
        }));
        payload = {
          type: 'yusik', date_str: formatKorDate(day.date), items,
          soup: { name: day.soup.name, ingred: day.soup.ingredients.split(',').map(s=>s.trim()).reduce((acc,_,i,arr)=>{ if(i%2===0)acc.push(arr.slice(i,i+2).join(', ')); return acc; },[]), origin: day.soup.origin||'' },
          origins: [...day.items.map(i=>i.origin), day.soup.origin||''].filter(Boolean).join(', '),
          notes: ['아이마다 좋아하는 맛과 속도가 달라 모든 메뉴가 항상 잘 맞지 않을 수 있습니다.','알레르기나 조정이 필요한 재료는 주문 시 편하게 말씀 주세요.','주문은 일요일 저녁 10시까지 부탁드립니다.','까꿍디미방은 재료 궁합을 고려해 식단을 구성하고, 친환경 재료를 사용해 정성스럽게 조리합니다.']
        };
      }

      const res = await fetch(IMAGE_API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error(`API 오류: ${res.status}`);

      const blob = await res.blob();

      // Blob → base64 data URL
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });

      // 이미지 원본 크기 확인 후 A4에 맞게 비율 조정
      const img = new Image();
      await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = dataUrl; });
      const ratio = Math.min(pageW / img.width, pageH / img.height);
      const w = img.width * ratio;
      const h = img.height * ratio;
      const x = (pageW - w) / 2;
      const y = (pageH - h) / 2;

      if (!isFirst) pdf.addPage();
      pdf.addImage(dataUrl, 'PNG', x, y, w, h);
      isFirst = false;

      await new Promise(r => setTimeout(r, 300));
    }

    const today = new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','');
    pdf.save(`까꿍디미방_이유식메뉴표_${today}.pdf`);
    showToast(`✅ PDF 다운로드 완료! (${currentMenu.length}페이지)`);
  } catch (e) {
    showToast(`❌ PDF 오류: ${e.message}`);
    console.error(e);
  } finally {
    btn.textContent = '📄 PDF 다운로드';
    btn.disabled = false;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
