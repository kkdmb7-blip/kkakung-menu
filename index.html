<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>까꿍 디미방 메뉴 생성기</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Dodum&display=swap');
:root {
  --bg: #FDF8F3;
  --card: #FFFFFF;
  --primary: #E8845A;
  --primary-light: #FFF0E8;
  --secondary: #6BAE8E;
  --secondary-light: #EBF7F2;
  --text: #2D2D2D;
  --text-light: #888;
  --border: #EDE8E0;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
header {
  background: white; border-bottom: 1px solid var(--border);
  padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}
.logo { font-family: 'Gowun Dodum', sans-serif; font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.logo span { font-size: 24px; }
.btn { padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #d4714a; transform: translateY(-1px); }
.btn-secondary { background: var(--secondary); color: white; }
.btn-secondary:hover { background: #5a9a7c; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.week-selector {
  background: white; border-radius: var(--radius); padding: 20px 24px;
  margin-bottom: 24px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.week-selector label { font-size: 14px; font-weight: 500; color: var(--text-light); }
.week-selector input[type="date"] {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; cursor: pointer;
}
.week-selector input[type="date"]:focus { border-color: var(--primary); }
.days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
.day-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s; }
.day-card:hover { transform: translateY(-2px); }
.day-header { padding: 14px 18px; font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: space-between; }
.day-label { font-size: 12px; font-weight: 500; color: var(--text-light); margin-bottom: 2px; }
.day-date { font-size: 18px; font-weight: 700; }
.menu-item { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; position: relative; }
.menu-item:last-child { border-bottom: none; }
.menu-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.menu-num.hanwoo { background: #FFF0E8; color: var(--primary); }
.menu-num.chicken { background: #EBF7F2; color: var(--secondary); }
.menu-num.other { background: #F0EEFF; color: #8B6FE8; }
.menu-content { flex: 1; }
.menu-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.menu-ingredients { font-size: 12px; color: var(--text-light); line-height: 1.5; }
.menu-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.menu-item:hover .menu-actions { opacity: 1; }
.action-btn { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; }
.action-btn.edit { background: #EBF7F2; color: var(--secondary); }
.action-btn.edit:hover { background: var(--secondary); color: white; }
.action-btn.delete { background: #FFF0E8; color: var(--primary); }
.action-btn.delete:hover { background: var(--primary); color: white; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: var(--radius); padding: 28px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: modalIn 0.2s ease; }
@keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.modal-section { margin-bottom: 20px; }
.modal-section label { display: block; font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-section input, .modal-section textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
.modal-section input:focus, .modal-section textarea:focus { border-color: var(--primary); }
.modal-section textarea { resize: vertical; min-height: 80px; }
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.suggestion-chip { padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
.suggestion-chip.hanwoo-chip { background: var(--primary-light); color: var(--primary); border-color: #f5c5aa; }
.suggestion-chip.hanwoo-chip:hover { background: var(--primary); color: white; }
.suggestion-chip.chicken-chip { background: var(--secondary-light); color: var(--secondary); border-color: #b8e0ce; }
.suggestion-chip.chicken-chip:hover { background: var(--secondary); color: white; }
.suggestion-chip.other-chip { background: #F0EEFF; color: #8B6FE8; border-color: #d4c8f8; }
.suggestion-chip.other-chip:hover { background: #8B6FE8; color: white; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); }
.bottom-bar-info { font-size: 13px; color: var(--text-light); }
.bottom-bar-actions { display: flex; gap: 10px; }
.toast { position: fixed; top: 80px; right: 24px; background: #2D2D2D; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 300; transform: translateX(120%); transition: transform 0.3s; display: flex; align-items: center; gap: 8px; }
.toast.show { transform: translateX(0); }
.section-title { font-size: 13px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; padding: 10px 18px 6px; border-bottom: 1px solid var(--border); }
.yusik-item { padding: 10px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.yusik-item:last-child { border-bottom: none; }
.yusik-name { font-size: 13px; font-weight: 600; flex: 1; }
.yusik-ingredients { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.category-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.tag-hanwoo { background: var(--primary-light); color: var(--primary); }
.tag-chicken { background: var(--secondary-light); color: var(--secondary); }
.tag-other { background: #F0EEFF; color: #8B6FE8; }
.history-badge { font-size: 10px; background: #fff3cd; color: #856404; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
pb { padding-bottom: 100px; display: block; }

/* 히스토리 패널 */
.history-panel { background: white; border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px; box-shadow: var(--shadow); }
.history-panel h4 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-light); }
.history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.history-tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.history-tag.week1 { background: #ffe0d0; color: #c0532a; }
.history-tag.week2 { background: #ffefd5; color: #a0732a; }
.history-tag.week3 { background: #fff9e0; color: #8a7a2a; }
.history-tag.week4 { background: #f0f8e8; color: #4a7a2a; }
.history-tag.week5 { background: #e8f4f0; color: #2a6a5a; }
</style>
</head>
<body>
<header>
  <div class="logo"><span>🍚</span> 까꿍 디미방 메뉴 생성기</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost" onclick="showHistory()">📋 히스토리</button>
    <button class="btn btn-ghost" onclick="printMenu()">🖨️ 인쇄</button>
    <button class="btn btn-primary" onclick="generateMenu()">✨ 새 메뉴 생성</button>
  </div>
</header>

<div class="container">
  <div class="week-selector">
    <label>주차 선택</label>
    <input type="date" id="weekStart" onchange="updateWeekDates()">
    <span style="font-size:14px;color:var(--text-light)">~</span>
    <input type="date" id="weekEnd" readonly style="background:#f9f9f9">
    <button class="btn btn-primary" style="margin-left:auto" onclick="generateMenu()">이 주차 메뉴 생성</button>
  </div>

  <div id="historyPanel" style="display:none" class="history-panel">
    <h4>📚 최근 5주 사용 재료 / 반찬 이력</h4>
    <div id="historyContent"></div>
  </div>

  <div id="menuContainer">
    <div style="text-align:center;padding:60px 20px;color:var(--text-light)">
      <div style="font-size:48px;margin-bottom:16px">🌿</div>
      <p style="font-size:15px;margin-bottom:20px">날짜를 선택하고 메뉴를 생성해보세요!</p>
      <button class="btn btn-primary" onclick="generateMenu()">✨ 지금 생성하기</button>
    </div>
  </div>
  <pb></pb>
</div>

<div class="bottom-bar">
  <div class="bottom-bar-info" id="bottomInfo">메뉴를 생성하면 편집할 수 있어요</div>
  <div class="bottom-bar-actions">
    <button class="btn btn-ghost" onclick="checkConflicts()">🔍 재료 중복 확인</button>
    <button class="btn btn-ghost" id="downloadBtn" onclick="downloadImages()">🖼️ 이미지 다운로드</button>
    <button class="btn btn-secondary" onclick="saveMenu()">💾 이번 주 저장</button>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 메뉴 편집</h3>
    <div class="modal-section">
      <label>메뉴 이름</label>
      <input type="text" id="editName" placeholder="예: 한우 브로콜리 죽">
    </div>
    <div class="modal-section">
      <label>재료</label>
      <textarea id="editIngredients" placeholder="예: 한우, 브로콜리, 쥬키니호박, 양파, 한우육수, 채소상탕"></textarea>
    </div>
    <div class="modal-section">
      <label>원산지</label>
      <input type="text" id="editOrigin" placeholder="예: 소고기호주산, 단호박뉴질랜드, 당근국내산">
    </div>
    <div class="modal-section" id="suggestionsSection">
      <label>추천 선택</label>
      <div class="suggestions" id="suggestionsList"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">취소</button>
      <button class="btn btn-primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// 한우 주재료 풀
const HANWOO_MAIN_POOL = Object.keys(PAIRINGS.hanwoo);
// 닭 주재료 풀
const CHICKEN_MAIN_POOL = Object.keys(PAIRINGS.chicken);
// 기타단백질 풀
const P3_POOL = Object.keys(PAIRINGS.protein3);

// ===== localStorage 히스토리 관리 =====
// 구조: { yusik: [{weekKey, menus:[{name,ingredients}]}], yushik_veggie: [{weekKey, hanwoo:[...], chicken:[...], p3:[...]}] }
const HISTORY_KEY = 'kkakung_history_v2';
const MAX_WEEKS = 5;

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || { yusik: [], yushik_veggie: [] }; }
  catch(e) { return { yusik: [], yushik_veggie: [] }; }
}

function saveHistory(h) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

function getWeekKey(mondayDateStr) { return mondayDateStr; }

// 5주 내 사용된 유아식 메뉴 이름 목록
function getUsedYusikNames() {
  const h = loadHistory();
  const used = new Set();
  h.yusik.forEach(w => w.menus.forEach(m => used.add(m.name)));
  return used;
}

// 전주 사용 야채 목록 (이유식)
function getPrevWeekVeggies() {
  const h = loadHistory();
  if (!h.yushik_veggie.length) return { hanwoo: [], chicken: [], p3: [] };
  const last = h.yushik_veggie[h.yushik_veggie.length - 1];
  return { hanwoo: last.hanwoo || [], chicken: last.chicken || [], p3: last.p3 || [] };
}

// 히스토리에 이번 주 저장
function recordThisWeek(weekKey, menuData) {
  const h = loadHistory();

  // 유아식 반찬 기록 (5주 유지)
  const yusikMenus = [];
  menuData.forEach(day => {
    if (day.type === 'yusik') {
      day.items.forEach(item => yusikMenus.push({ name: item.name, ingredients: item.ingredients }));
    }
  });
  h.yusik.push({ weekKey, menus: yusikMenus });
  if (h.yusik.length > MAX_WEEKS) h.yusik = h.yusik.slice(-MAX_WEEKS);

  // 이유식 야채 기록
  const usedHanwoo = [], usedChicken = [], usedP3 = [];
  menuData.forEach(day => {
    if (day.type === 'yushik') {
      day.menus.forEach(m => {
        if (m.type === 'hanwoo') usedHanwoo.push(m.mainVeggie);
        else if (m.type === 'chicken') usedChicken.push(m.mainVeggie);
        else usedP3.push(m.mainProtein);
      });
    }
  });
  h.yushik_veggie.push({ weekKey, hanwoo: usedHanwoo, chicken: usedChicken, p3: usedP3 });
  if (h.yushik_veggie.length > MAX_WEEKS) h.yushik_veggie = h.yushik_veggie.slice(-MAX_WEEKS);

  saveHistory(h);
}

// ===== 메뉴 생성 로직 =====
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function pickExcluding(pool, exclude) {
  const filtered = pool.filter(x => !exclude.includes(x));
  if (filtered.length === 0) return pool[Math.floor(Math.random() * pool.length)]; // 부득이하게
  return filtered[Math.floor(Math.random() * filtered.length)];
}

function buildYushikMenu(dayIndex, usedThisWeek, prevWeek) {
  // 한우
  const hwExclude = [...usedThisWeek.hanwoo, ...prevWeek.hanwoo];
  const hwMain = pickExcluding(HANWOO_MAIN_POOL, hwExclude);
  usedThisWeek.hanwoo.push(hwMain);
  const hwSubs = PAIRINGS.hanwoo[hwMain] || ['당근','쥬키니호박','양파','감자'];
  const hwSub = hwSubs[Math.floor(Math.random() * hwSubs.length)];

  // 닭
  const ckExclude = [...usedThisWeek.chicken, ...prevWeek.chicken];
  const ckMain = pickExcluding(CHICKEN_MAIN_POOL, ckExclude);
  usedThisWeek.chicken.push(ckMain);
  const ckSubs = PAIRINGS.chicken[ckMain] || ['당근','감자','쥬키니호박','양파'];
  const ckSub = ckSubs[Math.floor(Math.random() * ckSubs.length)];

  // 기타단백질
  const p3Exclude = [...usedThisWeek.p3, ...prevWeek.p3];
  const p3Main = pickExcluding(P3_POOL, p3Exclude);
  usedThisWeek.p3.push(p3Main);
  const p3Subs = PAIRINGS.protein3[p3Main] || ['당근','쥬키니호박','감자','양파'];
  const p3Sub = p3Subs[Math.floor(Math.random() * p3Subs.length)];

  return [
    {
      name: `한우 ${hwMain} 죽/무른밥/진밥`,
      displayName: `한우 ${hwMain}`,
      ingredients: `한우, ${hwMain}, ${hwSub}, 양파, 한우육수, 채소상탕`,
      type: 'hanwoo',
      mainVeggie: hwMain
    },
    {
      name: `닭가슴살 ${ckMain} 죽/무른밥/진밥`,
      displayName: `닭가슴살 ${ckMain}`,
      ingredients: `닭가슴살, ${ckMain}, ${ckSub}, 양파, 닭육수, 채소상탕`,
      type: 'chicken',
      mainVeggie: ckMain
    },
    {
      name: `${p3Main} ${p3Sub} 죽/무른밥/진밥`,
      displayName: `${p3Main} ${p3Sub}`,
      ingredients: `${p3Main}, ${p3Sub}, 당근, 양파, 채소상탕`,
      type: 'other',
      mainProtein: p3Main
    }
  ];
}

// ===== 상태 =====
let currentMenu = null;
let editTarget = null;

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  return d;
}
function formatDate(date) { return date.toISOString().split('T')[0]; }
function formatKorDate(date) {
  const days = ['일','월','화','수','목','금','토'];
  return `${date.getMonth()+1}월 ${date.getDate()}일(${days[date.getDay()]})`;
}

function updateWeekDates() {
  const start = new Date(document.getElementById('weekStart').value);
  const monday = getMonday(start);
  const friday = new Date(monday);
  friday.setDate(monday.getDate() + 4);
  document.getElementById('weekStart').value = formatDate(monday);
  document.getElementById('weekEnd').value = formatDate(friday);
}

function initDatePicker() {
  const today = new Date();
  const monday = getMonday(today);
  const nextMonday = new Date(monday);
  nextMonday.setDate(monday.getDate() + 7);
  const friday = new Date(nextMonday);
  friday.setDate(nextMonday.getDate() + 4);
  document.getElementById('weekStart').value = formatDate(nextMonday);
  document.getElementById('weekEnd').value = formatDate(friday);
}

function generateMenu() {
  const startVal = document.getElementById('weekStart').value;
  if (!startVal) { showToast('⚠️ 날짜를 먼저 선택해주세요'); return; }

  const monday = new Date(startVal);
  const weekKey = formatDate(monday);

  // 히스토리 로드
  const usedYusikNames = getUsedYusikNames();
  const prevWeek = getPrevWeekVeggies();

  // 이번 주 사용 추적
  const usedThisWeek = { hanwoo: [], chicken: [], p3: [] };

  // 유아식 반찬 풀에서 사용된 것 제거
  const availableYusik = YUSIK_MAIN.filter(m => !usedYusikNames.has(m.name));
  const yusikPool = availableYusik.length >= 5 ? availableYusik : YUSIK_MAIN; // 다 써서 없으면 전체 풀 사용

  const shuffledYusik = shuffle(yusikPool);
  const shuffledSoup = shuffle(YUSIK_SOUP);

  const dayNames = ['월','화','수','목','금'];
  const days = [];

  for (let i = 0; i < 5; i++) {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);

    if (i === 2) { // 수요일 = 유아식
      const items = shuffledYusik.slice(0, 5);
      const soup = shuffledSoup[0];
      days.push({ type: 'yusik', date, dayName: dayNames[i], items, soup });
    } else { // 이유식
      const menus = buildYushikMenu(i, usedThisWeek, prevWeek);
      days.push({ type: 'yushik', date, dayName: dayNames[i], menus });
    }
  }

  currentMenu = days;
  renderMenu();
  document.getElementById('bottomInfo').textContent =
    `${formatKorDate(monday)} ~ ${formatKorDate(new Date(monday.getTime() + 4*86400000))} 메뉴 (미저장)`;
}

function renderMenu() {
  if (!currentMenu) return;
  const container = document.getElementById('menuContainer');
  container.innerHTML = '<div class="days-grid">' + currentMenu.map((day, di) => renderDay(day, di)).join('') + '</div>';
}

function renderDay(day, di) {
  const dateStr = formatKorDate(day.date);
  if (day.type === 'yusik') {
    const itemsHtml = day.items.map((item, ii) => `
      <div class="yusik-item">
        <div style="flex:1">
          <div class="yusik-name">${ii+1}. ${item.name}</div>
          <div class="yusik-ingredients">${item.ingredients}</div>
          ${item.origin ? `<div style="font-size:10px;color:#aaa;margin-top:2px">${item.origin}</div>` : ''}
        </div>
        <div style="display:flex;gap:4px">
          <button class="action-btn edit" onclick="openEditYusik(${di},${ii})">✏️</button>
          <button class="action-btn delete" onclick="deleteYusik(${di},${ii})">✕</button>
        </div>
      </div>`).join('');

    // 반찬 추가 버튼
    const addBtn = day.items.length < 7 ? `
      <div style="padding:8px 18px;border-bottom:1px solid var(--border)">
        <button class="btn btn-ghost" style="width:100%;font-size:13px" onclick="addYusik(${di})">+ 반찬 추가</button>
      </div>` : '';

    return `
      <div class="day-card">
        <div class="day-header" style="background:linear-gradient(135deg,#E8845A,#d4714a);color:white;">
          <div>
            <div class="day-label" style="color:rgba(255,255,255,0.8)">유아식</div>
            <div class="day-date">${dateStr}</div>
          </div>
          <span style="font-size:11px;background:rgba(255,255,255,0.25);padding:4px 10px;border-radius:20px;font-weight:600">반찬5+국1</span>
        </div>
        <div class="section-title">반찬 메뉴</div>
        ${itemsHtml}
        ${addBtn}
        <div class="section-title">국</div>
        <div class="yusik-item">
          <div style="flex:1">
            <div class="yusik-name">${day.soup.name}</div>
            <div class="yusik-ingredients">${day.soup.ingredients}</div>
          </div>
          <button class="action-btn edit" onclick="openEditSoup(${di})">✏️</button>
        </div>
        <div style="padding:10px 18px;font-size:12px;color:var(--text-light);background:#f9f9f9;border-radius:0 0 16px 16px">
          💰 반찬5개 + 국1개 = 35,000원
        </div>
      </div>`;
  }

  const menusHtml = day.menus.map((menu, mi) => {
    const numClass = menu.type === 'hanwoo' ? 'hanwoo' : menu.type === 'chicken' ? 'chicken' : 'other';
    const tagClass = menu.type === 'hanwoo' ? 'tag-hanwoo' : menu.type === 'chicken' ? 'tag-chicken' : 'tag-other';
    const tagLabel = menu.type === 'hanwoo' ? '한우' : menu.type === 'chicken' ? '닭가슴살' : '기타단백질';
    return `
      <div class="menu-item">
        <div class="menu-num ${numClass}">${mi+1}</div>
        <div class="menu-content">
          <div class="menu-name">
            ${menu.displayName || menu.name}
            <span class="category-tag ${tagClass}">${tagLabel}</span>
          </div>
          <div class="menu-ingredients">${menu.ingredients}</div>
        </div>
        <div class="menu-actions">
          <button class="action-btn edit" onclick="openEdit(${di},${mi})">✏️</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="day-card">
      <div class="day-header" style="background:linear-gradient(135deg,#FDF0E8,#FDE8D8);">
        <div>
          <div class="day-label" style="color:#999">이유식</div>
          <div class="day-date" style="color:#2D2D2D">${dateStr}</div>
        </div>
        <span style="font-size:11px;background:var(--primary-light);color:var(--primary);padding:4px 10px;border-radius:20px;font-weight:600">중기·후기·완료기</span>
      </div>
      ${menusHtml}
    </div>`;
}

// ===== 편집 =====
function openEdit(di, mi) {
  editTarget = { type: 'menu', di, mi };
  const menu = currentMenu[di].menus[mi];
  document.getElementById('editName').value = menu.displayName || menu.name;
  document.getElementById('editIngredients').value = menu.ingredients;
  document.getElementById('editOrigin').value = '';
  showIngredientSuggestions(menu.type);
  document.getElementById('editModal').classList.add('active');
}

function openEditYusik(di, ii) {
  editTarget = { type: 'yusik', di, ii };
  const item = currentMenu[di].items[ii];
  document.getElementById('editName').value = item.name;
  document.getElementById('editIngredients').value = item.ingredients;
  document.getElementById('editOrigin').value = item.origin || '';
  const list = document.getElementById('suggestionsList');
  list.innerHTML = YUSIK_MAIN.map(m =>
    `<span class="suggestion-chip other-chip" onclick="applyYusikSuggestion('${m.name}','${m.ingredients}')">${m.name}</span>`
  ).join('');
  document.getElementById('editModal').classList.add('active');
}

function openEditSoup(di) {
  editTarget = { type: 'soup', di };
  const soup = currentMenu[di].soup;
  document.getElementById('editName').value = soup.name;
  document.getElementById('editIngredients').value = soup.ingredients;
  document.getElementById('editOrigin').value = soup.origin || '';
  const list = document.getElementById('suggestionsList');
  list.innerHTML = YUSIK_SOUP.map(s =>
    `<span class="suggestion-chip chicken-chip" onclick="applySoupSuggestion('${s.name}','${s.ingredients}')">${s.name}</span>`
  ).join('');
  document.getElementById('editModal').classList.add('active');
}

function showIngredientSuggestions(type) {
  const list = document.getElementById('suggestionsList');
  const pool = type === 'hanwoo' ? HANWOO_MAIN_POOL : type === 'chicken' ? CHICKEN_MAIN_POOL : P3_POOL;
  const chipClass = type === 'hanwoo' ? 'hanwoo-chip' : type === 'chicken' ? 'chicken-chip' : 'other-chip';
  list.innerHTML = pool.map(v =>
    `<span class="suggestion-chip ${chipClass}" onclick="applyMainIngredient('${v}','${type}')">${v}</span>`
  ).join('');
}

function applyMainIngredient(main, type) {
  const pairings = PAIRINGS[type === 'hanwoo' ? 'hanwoo' : type === 'chicken' ? 'chicken' : 'protein3'];
  const subs = pairings[main] || ['당근','쥬키니호박','감자'];
  const sub = subs[Math.floor(Math.random() * subs.length)];
  const base = type === 'hanwoo' ? '한우' : type === 'chicken' ? '닭가슴살' : main;
  const broth = type === 'hanwoo' ? '한우육수' : type === 'chicken' ? '닭육수' : '채소상탕';
  if (type !== 'other') {
    document.getElementById('editName').value = `${base} ${main}`;
    document.getElementById('editIngredients').value = `${base}, ${main}, ${sub}, 양파, ${broth}, 채소상탕`;
  } else {
    document.getElementById('editName').value = `${main} ${sub}`;
    document.getElementById('editIngredients').value = `${main}, ${sub}, 당근, 양파, 채소상탕`;
  }
}

function applyYusikSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  document.getElementById('editIngredients').value = ingredients;
}
function applySoupSuggestion(name, ingredients) {
  document.getElementById('editName').value = name;
  document.getElementById('editIngredients').value = ingredients;
}

function saveEdit() {
  const name = document.getElementById('editName').value.trim();
  const ingredients = document.getElementById('editIngredients').value.trim();
  const origin = document.getElementById('editOrigin').value.trim();
  if (!name) { showToast('⚠️ 메뉴 이름을 입력해주세요'); return; }

  if (editTarget.type === 'menu') {
    const { di, mi } = editTarget;
    const menu = currentMenu[di].menus[mi];
    menu.displayName = name;
    menu.name = name.includes('죽') ? name : name + ' 죽/무른밥/진밥';
    if (ingredients) menu.ingredients = ingredients;
  } else if (editTarget.type === 'yusik') {
    const { di, ii } = editTarget;
    currentMenu[di].items[ii].name = name;
    if (ingredients) currentMenu[di].items[ii].ingredients = ingredients;
    currentMenu[di].items[ii].origin = origin;
  } else if (editTarget.type === 'soup') {
    const { di } = editTarget;
    currentMenu[di].soup.name = name;
    if (ingredients) currentMenu[di].soup.ingredients = ingredients;
    currentMenu[di].soup.origin = origin;
  }

  renderMenu();
  closeModal('editModal');
  showToast('✅ 메뉴가 수정됐어요');
}

function deleteYusik(di, ii) {
  if (currentMenu[di].items.length <= 3) { showToast('⚠️ 최소 3개는 있어야 해요'); return; }
  currentMenu[di].items.splice(ii, 1);
  renderMenu();
  showToast('🗑️ 메뉴가 삭제됐어요');
}

function addYusik(di) {
  // 빈 항목 추가 후 바로 편집 모달 오픈
  currentMenu[di].items.push({ name: '', ingredients: '', origin: '' });
  renderMenu();
  const newIdx = currentMenu[di].items.length - 1;
  openEditYusik(di, newIdx);
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ===== 저장 =====
function saveMenu() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }
  const weekKey = document.getElementById('weekStart').value;
  recordThisWeek(weekKey, currentMenu);
  document.getElementById('bottomInfo').textContent =
    `✅ ${weekKey} 저장 완료 — 다음 생성 시 자동 반영`;
  showToast('💾 저장됐어요! 다음 주 생성 시 중복 자동 제거');
}

// ===== 중복 확인 =====
function checkConflicts() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }
  const all = [];
  currentMenu.forEach(day => {
    if (day.type === 'yushik') {
      day.menus.forEach(m => {
        m.ingredients.split(/[,\s]+/).forEach(i => { if (i.length > 1) all.push(i.trim()); });
      });
    }
  });
  const exempt = new Set(['양파','채소상탕','한우육수','닭육수','당근','']);
  const counts = {};
  all.forEach(i => { if (!exempt.has(i)) counts[i] = (counts[i]||0)+1; });
  const dups = Object.entries(counts).filter(([k,v]) => v > 1);
  if (dups.length === 0) showToast('✅ 이번 주 재료 중복 없음!');
  else showToast(`⚠️ 중복 재료: ${dups.map(d=>d[0]).join(', ')}`);
}

// ===== 히스토리 보기 =====
function showHistory() {
  const panel = document.getElementById('historyPanel');
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }

  const h = loadHistory();
  let html = '';

  if (h.yusik.length) {
    html += '<div style="margin-bottom:16px"><strong style="font-size:13px">유아식 반찬 (최근 5주)</strong><div class="history-tags" style="margin-top:8px">';
    h.yusik.forEach((w, wi) => {
      const cls = `week${h.yusik.length - wi}`;
      w.menus.forEach(m => {
        html += `<span class="history-tag ${cls}" title="${w.weekKey}">${m.name}</span>`;
      });
    });
    html += '</div></div>';
  }

  if (h.yushik_veggie.length) {
    html += '<div><strong style="font-size:13px">이유식 주재료 (최근 사용)</strong><div class="history-tags" style="margin-top:8px">';
    const last = h.yushik_veggie[h.yushik_veggie.length - 1];
    [...(last.hanwoo||[]), ...(last.chicken||[]), ...(last.p3||[])].forEach(v => {
      html += `<span class="history-tag week1">${v}</span>`;
    });
    html += '</div></div>';
  }

  if (!html) html = '<p style="font-size:13px;color:var(--text-light)">아직 저장된 기록이 없어요. 메뉴 생성 후 저장해주세요.</p>';

  document.getElementById('historyContent').innerHTML = html;
  panel.style.display = 'block';
}

function printMenu() { window.print(); }

// ===== 이미지 다운로드 =====
const IMAGE_API = '/api/menu-image';

async function downloadImages() {
  if (!currentMenu) { showToast('⚠️ 먼저 메뉴를 생성해주세요'); return; }

  const btn = document.getElementById('downloadBtn');
  btn.textContent = '⏳ 생성 중...';
  btn.disabled = true;

  try {
    let downloaded = 0;
    for (const day of currentMenu) {
      let payload;

      if (day.type === 'yushik') {
        // 이유식 - 3개 메뉴에서 이름/재료 추출
        const menus = day.menus.map(m => ({
          name: (m.displayName || m.name).replace(' 죽/무른밥/진밥',''),
          ingred: m.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
            return acc;
          }, [])
        }));

        // 원산지 자동 생성 (재료에서 추출)
        const allIngred = day.menus.flatMap(m =>
          m.ingredients.split(',').map(s => s.trim()).filter(s => s && !['양파','채소상탕','한우육수','닭육수'].includes(s))
        );
        const origins = [...new Set(allIngred)].map(i => i + '국내산').join(', ');

        payload = {
          type: 'yushik',
          date_str: formatKorDate(day.date),
          menus,
          origins
        };
      } else {
        // 유아식 - 각 item의 origin 직접 사용
        const items = day.items.map(item => ({
          name: item.name,
          ingred: item.ingredients.split(',').map(s => s.trim()).reduce((acc, _, i, arr) => {
            if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
            return acc;
          }, []),
          origin: item.origin || ''
        }));

        const soupIngred = day.soup.ingredients.split(',').map(s => s.trim());

        // 원산지: 각 item.origin 합치기
        const allOrigins = [
          ...day.items.map(i => i.origin).filter(Boolean),
          day.soup.origin || ''
        ].filter(Boolean).join(', ');

        payload = {
          type: 'yusik',
          date_str: formatKorDate(day.date),
          items,
          soup: {
            name: day.soup.name,
            ingred: soupIngred.reduce((acc, _, i, arr) => {
              if (i % 2 === 0) acc.push(arr.slice(i, i+2).join(', '));
              return acc;
            }, []),
            origin: day.soup.origin || ''
          },
          origins: allOrigins,
          notes: [
            '아이마다 좋아하는 맛과 속도가 달라 모든 메뉴가 항상 잘 맞지 않을 수 있습니다.',
            '알레르기나 조정이 필요한 재료는 주문 시 편하게 말씀 주세요.',
            '주문은 일요일 저녁 10시까지 부탁드립니다.',
            '까꿍디미방은 재료 궁합을 고려해 식단을 구성하고, 친환경 재료를 사용해 정성스럽게 조리합니다.',
          ]
        };
      }

      const res = await fetch(IMAGE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`API 오류: ${res.status}`);

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const typeLabel = day.type === 'yushik' ? '이유식' : '유아식';
      a.href = url;
      a.download = `까꿍디미방_${typeLabel}_${formatKorDate(day.date)}.png`;
      a.click();
      URL.revokeObjectURL(url);
      downloaded++;

      // 연속 다운로드 간격
      await new Promise(r => setTimeout(r, 500));
    }

    showToast(`✅ ${downloaded}개 이미지 다운로드 완료!`);
  } catch (e) {
    showToast(`❌ 오류: ${e.message}`);
    console.error(e);
  } finally {
    btn.textContent = '🖼️ 이미지 다운로드';
    btn.disabled = false;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) closeModal('editModal');
});

initDatePicker();
